<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>You're offline — PH Labs</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #020617; color: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 460px; width: 100%; background: #0f172a; border: 1px solid #1e293b;
      border-radius: 16px; padding: 32px; text-align: center; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
      border-radius: 999px; background: rgba(16,185,129,.12); color: #10b981;
      font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: #10b981;
      box-shadow: 0 0 0 4px rgba(16,185,129,.15); }
    h1 { margin: 20px 0 8px; font-size: 24px; font-weight: 700; letter-spacing: -.01em; }
    p { margin: 0 0 20px; color: #cbd5e1; font-size: 15px; line-height: 1.55; }
    .btn { display: inline-flex; align-items: center; justify-content: center;
      height: 44px; padding: 0 20px; border-radius: 10px; background: #10b981;
      color: #02110b; font-weight: 600; font-size: 14px; text-decoration: none;
      border: 0; cursor: pointer; transition: background .15s ease; }
    .btn:hover { background: #34d399; }
    .muted { margin-top: 16px; font-size: 12px; color: #64748b; }
    .logo { font-weight: 800; letter-spacing: .14em; font-size: 14px; color: #94a3b8; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">PH LABS</div>
    <div style="height:18px"></div>
    <span class="badge"><span class="dot"></span> Offline</span>
    <h1>You're offline</h1>
    <p>We can't reach PH Labs right now. Check your connection and try again — your cart and account will be waiting.</p>
    <button class="btn" onclick="location.reload()">Try again</button>
    <div class="muted">For Research Use Only. Not for Human Consumption.</div>
  </main>
  <script>
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
