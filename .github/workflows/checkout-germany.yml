name: Checkout Germany (schema + e2e)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  schema:
    name: Vitest — server schema (Germany)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      # Cache Bun's global module store keyed on the lockfile so unchanged
      # deps skip network fetches on every PR run.
      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      - name: Run server-schema suite
        run: bunx vitest run tests/create-order-schema-germany.test.ts

  e2e:
    name: Playwright — Germany checkout (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: schema
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # Bun deps cache — shared across matrix legs (same lockfile → same key).
      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      # Cache the Playwright browser binaries per browser+version so cold
      # `playwright install` only downloads when the pinned version changes.
      # Keyed on the resolved @playwright/test version from bun.lock — bump
      # the lockfile and the cache invalidates automatically.
      - name: Resolve Playwright version
        id: pw
        run: |
          VERSION="$(node -p "require('./node_modules/@playwright/test/package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}-${{ matrix.browser }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}-

      # On cache hit: only install the OS-level shared libraries (fast).
      # On cache miss: download the browser binary and its OS deps.
      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps ${{ matrix.browser }}
          else
            bunx playwright install --with-deps ${{ matrix.browser }}
          fi
          # The dev server itself spawns a chromium headless shell
          # (independent of the test browser). Webkit/firefox jobs used to
          # fail intermittently with "Executable doesn't exist ...
          # chromium_headless_shell-*" depending on cache luck — install it
          # explicitly in every non-chromium job.
          if [ "${{ matrix.browser }}" != "chromium" ]; then
            bunx playwright install --with-deps chromium --only-shell
          fi

      - name: Start local dev server
        run: |
          (bun run dev --host 127.0.0.1 --port 8080 > server.log 2>&1 &)
          for i in $(seq 1 120); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8080/checkout"; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start"; tail -n 200 server.log; exit 1

      - name: Run Germany checkout spec on ${{ matrix.browser }}
        # Run against localhost so headless browsers avoid Cloudflare bot
        # handling and the SSO-gated preview URL. The spec stubs order APIs.
        env:
          TEST_BASE_URL: http://127.0.0.1:8080
        run: bunx playwright test e2e/checkout-germany.spec.ts --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
            server.log
          retention-days: 14
          if-no-files-found: ignore
