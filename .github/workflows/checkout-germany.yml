name: Checkout Germany (schema + e2e)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema:
    name: Vitest — server schema (Germany)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      # Cache Bun's global module store keyed on the lockfile so unchanged
      # deps skip network fetches on every PR run.
      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      - name: Run server-schema suite
        run: bunx vitest run tests/create-order-schema-germany.test.ts

  e2e:
    name: Playwright — Germany checkout (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: schema
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # Bun deps cache — shared across matrix legs (same lockfile → same key).
      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      # Cache the Playwright browser binaries per browser+version so cold
      # `playwright install` only downloads when the pinned version changes.
      # Keyed on the resolved @playwright/test version from bun.lockb — bump
      # the lockfile and the cache invalidates automatically.
      - name: Resolve Playwright version
        id: pw
        run: |
          VERSION="$(node -p "require('./node_modules/@playwright/test/package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}-${{ matrix.browser }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}-

      # On cache hit: only install the OS-level shared libraries (fast).
      # On cache miss: download the browser binary and its OS deps.
      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps ${{ matrix.browser }}
          else
            bunx playwright install --with-deps ${{ matrix.browser }}
          fi

      - name: Run Germany checkout spec on ${{ matrix.browser }}
        # Point at the live domain — the Lovable preview URL now requires
        # authentication (SSO login wall), which blocks every unauthenticated
        # Playwright navigation and makes `getByLabel(/first name/i)` time out
        # on the login page. Live phlabs.co.uk is public and serves the real
        # checkout flow the spec was written against.
        env:
          TEST_BASE_URL: https://phlabs.co.uk
        run: bunx playwright test e2e/checkout-germany.spec.ts --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
