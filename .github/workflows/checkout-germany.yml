name: Checkout Germany (schema + e2e)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema:
    name: Vitest — server schema (Germany)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run server-schema suite
        run: bunx vitest run tests/create-order-schema-germany.test.ts

  e2e:
    name: Playwright — Germany checkout (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: schema
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('bun.lockb', 'package.json') }}

      - name: Install Playwright browser (${{ matrix.browser }}) + system deps
        run: bunx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Germany checkout spec on ${{ matrix.browser }}
        run: bunx playwright test e2e/checkout-germany.spec.ts --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
