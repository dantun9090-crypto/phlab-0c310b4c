name: Cache headers scan

# Probes the four cache headers (cache-control, cdn-cache-control,
# surrogate-control, cf-cache-status) on public + sensitive paths and
# fails CI on any violation. Generates JSON + Markdown artifacts.

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"

jobs:
  scan:
    name: Probe cache headers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for edge propagation
        if: github.event_name == 'push'
        run: sleep 60

      - name: Run cache header scan
        id: scan
        env:
          CACHE_SCAN_BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
          CACHE_SCAN_OUT_DIR: cache-headers-report
        run: |
          set +e
          bun run scripts/cache-headers-scan.ts
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-headers-report-${{ github.sha }}
          path: cache-headers-report/
          retention-days: 30

      - name: Open issue on violation
        if: steps.scan.outputs.exit_code != '0' && github.event_name != 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Cache header regression on ${sha}`,
              labels: ['regression', 'cache', 'post-deploy'],
              body: [
                `Cache header scan failed against the live edge.`,
                ``,
                `Likely causes:`,
                `- a sensitive path (/cart, /checkout, /login, /admin, …) started returning a cacheable cache-control / cdn-cache-control / surrogate-control header`,
                `- cf-cache-status reported HIT/REVALIDATED/STALE on a sensitive path (user-specific HTML replayed from edge)`,
                `- a public page exceeded the 1h effective TTL ceiling or lost all cache headers`,
                ``,
                `Download the \`cache-headers-report-${context.sha}\` artifact from the run for the full JSON + Markdown report.`,
                ``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });

      - name: Fail job on violation
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1
