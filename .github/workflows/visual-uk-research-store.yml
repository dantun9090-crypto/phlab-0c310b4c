name: Visual regression · /uk-research-store

# Runs the Playwright visual + 4px-grid spec for /uk-research-store on every
# pull request and every push to main. Failure blocks the PR; the diff PNGs
# and HTML report are uploaded as artifacts for review.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override base URL (defaults to https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"
      update_snapshots:
        description: "Regenerate visual baselines from this run"
        type: boolean
        default: false

concurrency:
  group: visual-uk-research-store-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Default to the local SSR dev server instead of the live phlabs.co.uk
      # domain: Cloudflare's bot-management edge returns the SSR "Taking
      # longer than usual" shell to headless chromium, so the real hero
      # never renders and every locator inside the spec times out. Running
      # against `vite dev` bypasses the edge and gives the same DOM as a
      # real browser.
      RESEARCH_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8080' }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start SSR dev server
        run: |
          bun run dev --host 127.0.0.1 --port 8080 &
          for i in {1..90}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/uk-research-store || echo 000)
            if [ "$code" != "000" ] && [ "$code" -lt 500 ]; then exit 0; fi
            sleep 1
          done
          echo "dev server failed to start" >&2
          exit 1
        env:
          NODE_ENV: development

      - name: Check whether baselines exist
        id: baselines
        run: |
          shopt -s nullglob
          files=(e2e/uk-research-store-visual.spec.ts-snapshots/*.png)
          if [ ${#files[@]} -eq 0 ]; then
            echo "present=false" >> $GITHUB_OUTPUT
          else
            echo "present=true" >> $GITHUB_OUTPUT
          fi

      - name: Run /uk-research-store visual + 4px grid spec
        # `--output` pins the folder Playwright writes actual/expected/diff
        # PNGs into on a failed toHaveScreenshot assertion. HTML report is
        # emitted alongside so reviewers get both the interactive diff viewer
        # and the raw PNGs in the artifact. When no baselines exist yet,
        # auto-generate them so the first run seeds the snapshot folder.
        env:
          UPDATE_SNAPSHOTS: ${{ github.event.inputs.update_snapshots }}
          BASELINES_PRESENT: ${{ steps.baselines.outputs.present }}
        run: |
          FLAGS=""
          if [ "$UPDATE_SNAPSHOTS" = "true" ] || [ "$BASELINES_PRESENT" = "false" ]; then
            FLAGS="--update-snapshots"
          fi
          bunx playwright test e2e/uk-research-store-visual.spec.ts --project=chromium --reporter=line,html --output=test-results $FLAGS

      - name: Commit auto-generated baselines back to main
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.baselines.outputs.present == 'false' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/uk-research-store-visual.spec.ts-snapshots/
          if ! git diff --cached --quiet; then
            git commit -m "chore(visual): seed uk-research-store baselines [skip ci]"
            git push
          fi

      - name: Upload regenerated snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: uk-research-store-snapshots
          path: e2e/uk-research-store-visual.spec.ts-snapshots/
          retention-days: 30

      - name: Collect screenshot diff PNGs
        if: failure()
        run: |
          mkdir -p visual-diffs
          # Playwright names failed-screenshot files *-actual.png / *-expected.png / *-diff.png
          find test-results -type f \( -name '*-actual.png' -o -name '*-expected.png' -o -name '*-diff.png' \) -print -exec cp --parents {} visual-diffs/ \;
          echo "Collected diff PNGs:" && find visual-diffs -type f | sort

      - name: Upload Playwright report + diff PNGs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-uk-research-store
          path: |
            playwright-report
            test-results
            visual-diffs
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on PR when the check fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const body = [
              "Visual regression check for `/uk-research-store` **failed**.",
              "",
              `- Run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              `- Base URL: \`${process.env.RESEARCH_BASE_URL}\``,
              "",
              "Download the `playwright-report-uk-research-store` artifact for actual / expected / diff PNGs.",
              "If the change is intentional, refresh baselines locally with:",
              "",
              "```bash",
              "bunx playwright test e2e/uk-research-store-visual.spec.ts --update-snapshots",
              "```",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
