name: Day Theme Audit (axe + visual regression)

# Runs the unified light-theme audit:
#   - axe-core WCAG 2.1 AA scan (fails on critical/serious findings)
#   - day/night toggle contract under prefers-color-scheme + prefers-reduced-motion
#   - "no heavy dark surface" regression scan on main + extended routes
#   - visual regression snapshots (committed under
#     e2e/day-theme-audit.spec.ts-snapshots/). Subsequent runs fail on diff.
#
# To (re)baseline snapshots intentionally:
#   gh workflow run "Day Theme Audit (axe + visual regression)" \
#     -f update_snapshots=true
# then commit the regenerated PNGs from the uploaded artifact.

on:
  pull_request:
    paths:
      - "src/**"
      - "e2e/day-theme-audit.spec.ts"
      - "src/styles.css"
      - "src/components/DayNightToggle.tsx"
      - ".github/workflows/day-theme-audit.yml"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate visual baselines"
        type: boolean
        default: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      - name: Install Playwright browsers
        # Day-theme audit spec runs on chromium AND firefox projects, so both
        # browser binaries must be present or Firefox tests fail with
        # "Executable doesn't exist at .../firefox".
        run: bunx playwright install --with-deps chromium firefox

      # No build step: the audit runs against `vite dev` (SSR), which
      # transpiles on the fly. Skipping `bun run build` saves ~90s per run.



      - name: Start SSR dev server
        # `vite preview` only serves the static `dist/client` output, so the
        # SSR shell that injects the inline theme-boot script never runs and
        # every day-theme test times out waiting for [data-theme-mode].
        # `vite dev` (via the TanStack Start plugin) renders the SSR shell,
        # which is exactly what the audit needs.
        run: |
          bun run dev --host 127.0.0.1 --port 8080 &
          for i in {1..90}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ || echo 000)
            if [ "$code" != "000" ] && [ "$code" -lt 500 ]; then exit 0; fi
            sleep 1
          done
          echo "dev server failed to start" >&2
          exit 1
        env:
          NODE_ENV: development


      - name: Run day-theme audit
        env:
          TEST_BASE_URL: http://localhost:8080
          UPDATE_SNAPSHOTS: ${{ github.event.inputs.update_snapshots }}
        run: |
          if [ "$UPDATE_SNAPSHOTS" = "true" ]; then
            bun run test:day-theme:update
          else
            bun run test:day-theme
          fi

      - name: Build PR comment (pass/fail + diff thumbnails)
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          node scripts/day-theme-pr-comment.mjs \
            --report playwright-report/report.json \
            --results test-results \
            --out pr-comment.md
          echo "--- pr-comment.md ---"
          head -c 2000 pr-comment.md || true

      - name: Post PR comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: day-theme-audit
          path: pr-comment.md

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: day-theme-audit-report
          path: |
            playwright-report/
            test-results/
            e2e/day-theme-audit.spec.ts-snapshots/
            pr-comment.md
          retention-days: 14

      - name: Upload regenerated snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: day-theme-snapshots
          path: e2e/day-theme-audit.spec.ts-snapshots/
          retention-days: 30
