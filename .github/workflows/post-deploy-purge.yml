name: Post-deploy Cloudflare purge

# Auto-purges Cloudflare cache after every production deploy of phlabs.co.uk.
# Belt-and-braces layer — the Worker itself also auto-purges on first request
# under a new __BUILD_ID__ via /api/public/post-publish-check. This workflow
# is the git-side safety net: it fires when code is pushed to main (Lovable
# publish, direct git push, or GitHub API dispatch from external tooling).
#
# Triggers:
#  - push to main (Lovable auto-commits every editor edit)
#  - workflow_dispatch (manual run from Actions tab)
#  - repository_dispatch: lovable-publish (for external publish hooks)
#
# Safeguards:
#  - Waits 90s (was 30s — Lovable Worker propagation p95 is ~60-90s) so the
#    purge hits the NEW Worker version, not the old one.
#  - Full purge (purge_everything) — see mem://preferences/post-publish-edge-purge.
#  - Post-purge probe: hits /, /products, /compound with cache-busting URL
#    and confirms cf-cache-status transitions to MISS/BYPASS (i.e. the old
#    edge object is really gone). Non-fatal on failure — never blocks deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [lovable-publish]

concurrency:
  group: post-deploy-purge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  purge:
    name: Purge Cloudflare edge cache
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - name: Wait 90s for Worker deploy propagation
        # Lovable's Worker deploy runs asynchronously from the git push. The
        # old 30s window was landing the purge on the OLD Worker version,
        # which just re-cached the OLD HTML. 90s covers the observed p95.
        run: sleep 90

      - name: Full cache purge (purge_everything)
        shell: bash
        run: |
          set +e
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::warning::CF_API_TOKEN or CF_ZONE_ID not set — skipping purge (deploy not failed)"
            exit 0
          fi
          # Full purge per mem://preferences/post-publish-edge-purge — scoped
          # purges left stale HTML on non-listed routes (compound, product
          # pages, etc.).
          payload='{"purge_everything":true}'
          resp=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "$resp"
          if echo "$resp" | grep -q '"success":true'; then
            echo "Cache purged successfully"
          else
            echo "::warning::Cache purge failed: $resp"
          fi
          exit 0

      - name: Verify edge is serving fresh (fails on HIT/STALE)
        # Runs the end-to-end edge cache verification script. Retries each
        # route up to 3 times with 10s backoff to absorb tiered-cache
        # propagation, then FAILS the workflow if any route still returns
        # HIT or STALE — that means the purge landed on the old Worker or
        # the new Worker version isn't serving yet.
        env:
          BASE_URL: https://phlabs.co.uk
          ROUTES: "/ /products /compound /about"
          MAX_RETRIES: "3"
          RETRY_DELAY_SEC: "10"
        run: |
          # Let the tiered cache settle before probing.
          sleep 20
          bash scripts/verify-edge-cache.sh

