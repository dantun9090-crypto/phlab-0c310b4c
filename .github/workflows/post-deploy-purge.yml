name: Post-deploy Cloudflare purge

# Auto-purges Cloudflare cache after every production deploy of phlabs.co.uk.
# Belt-and-braces layer — the Worker itself also auto-purges on first request
# under a new __BUILD_ID__ via /api/public/post-publish-check. This workflow
# is the git-side safety net: it fires when code is pushed to main (Lovable
# publish, direct git push, or GitHub API dispatch from external tooling).
#
# Triggers:
#  - push to main (Lovable auto-commits every editor edit)
#  - workflow_dispatch (manual run from Actions tab)
#  - repository_dispatch: lovable-publish (for external publish hooks)
#
# Safeguards:
#  - Waits 90s (was 30s — Lovable Worker propagation p95 is ~60-90s) so the
#    purge hits the NEW Worker version, not the old one.
#  - Full purge (purge_everything) — see mem://preferences/post-publish-edge-purge.
#  - Post-purge probe: hits /, /products, /compound with cache-busting URL
#    and confirms cf-cache-status transitions to MISS/BYPASS (i.e. the old
#    edge object is really gone). Non-fatal on failure — never blocks deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Probe retry behaviour"
        type: choice
        default: retry_on
        options: [retry_on, retry_off]
      target_domain:
        description: "Domain(s) to purge + probe"
        type: choice
        default: both
        options: [both, phlabs.co.uk, prohealthpeptides.co.uk]
      dry_run:
        description: "Dry-run: skip real purge/recache POSTs, only log intent + run read-only verify (no issue open, no fail on HIT)"
        type: choice
        default: "false"
        options: ["false", "true"]
  repository_dispatch:
    types: [lovable-publish]


concurrency:
  group: post-deploy-purge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  purge:
    name: Purge Cloudflare edge cache
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout (needed for scripts/verify-edge-cache.sh)
        uses: actions/checkout@v4

      - name: Capture pre-purge Worker build id
        # Records which __BUILD_ID__ is currently live BEFORE we purge, so
        # the structured log for this run can be correlated with the
        # invalidation.done record in Firestore auditLogs.
        id: pre
        run: |
          hdrs=$(curl -sSI --max-time 15 "https://phlabs.co.uk/" || true)
          pre=$(echo "$hdrs" | grep -i '^x-build-id:' | tail -n1 | awk '{print $2}' | tr -d '\r')
          echo "pre_build_id=${pre:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Pre-purge Worker build id: ${pre:-unknown}"

      - name: Wait 90s for Worker deploy propagation
        # Lovable's Worker deploy runs asynchronously from the git push. The
        # old 30s window was landing the purge on the OLD Worker version,
        # which just re-cached the OLD HTML. 90s covers the observed p95.
        run: sleep 90

      - name: Full cache purge (purge_everything)
        id: cf_purge
        shell: bash
        run: |
          set +e
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::warning::CF_API_TOKEN or CF_ZONE_ID not set — skipping purge (deploy not failed)"
            exit 0
          fi
          payload='{"purge_everything":true}'
          started=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY-RUN — would POST purge_everything to zone ${CF_ZONE_ID}"
            resp='{"success":true,"dry_run":true,"skipped":"cf.purge","payload":"purge_everything"}'
            stage="cf.purge.dry_run"
            ok=true
          else
            resp=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$payload")
            stage="cf.purge"
            ok=false
            if echo "$resp" | grep -q '"success":true'; then ok=true; fi
          fi
          finished=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{"ts":"%s","kind":"edge_cache_verify","runId":"%s","stage":"%s","startedAt":"%s","finishedAt":"%s","ok":%s,"prePurgeBuildId":"%s","response":%s}\n' \
            "$finished" "${GITHUB_RUN_ID:-local}" "$stage" "$started" "$finished" "$ok" \
            "${{ steps.pre.outputs.pre_build_id }}" \
            "$(echo "$resp" | head -c 800 | jq -Rs . 2>/dev/null || echo '""')" \
            | tee -a ./edge-cache-verify.ndjson
          if [ "$ok" = "false" ]; then
            echo "::warning::Cache purge failed: $resp"
          fi
          exit 0

      - name: Verify edge is serving fresh (fails on HIT/STALE)
        # Runs the end-to-end edge cache verification script. Retries each
        # route up to 3 times with 10s backoff to absorb tiered-cache
        # propagation, then FAILS the workflow if any route still returns
        # HIT or STALE — that means the purge landed on the old Worker or
        # the new Worker version isn't serving yet. Appends structured
        # NDJSON logs to ./edge-cache-verify.ndjson (uploaded as artifact).
        env:
          BASE_URL: https://phlabs.co.uk
          ROUTES: "/ /products /compound /about"
          MAX_RETRIES: "3"
          RETRY_DELAY_SEC: "10"
          LOG_JSON: ./edge-cache-verify.ndjson
        run: |
          # Let the tiered cache settle before probing.
          sleep 20
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY-RUN — running verify probe read-only; HITs are expected because purge was skipped, so failures are downgraded to warnings."
            bash scripts/verify-edge-cache.sh || echo "::warning::verify-edge-cache.sh reported HIT/STALE under dry-run (expected — no purge was sent)"
            exit 0
          fi
          bash scripts/verify-edge-cache.sh

      - name: Upload structured verification logs
        # Always runs, even on step failure — the failure IS the artifact.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-cache-verify-${{ github.run_id }}
          path: ./edge-cache-verify.ndjson
          retention-days: 30

      - name: Print structured log summary
        if: always()
        run: |
          echo "=== Structured NDJSON log (edge-cache-verify.ndjson) ==="
          if [ -f ./edge-cache-verify.ndjson ]; then
            cat ./edge-cache-verify.ndjson
          else
            echo "(no log file produced)"
          fi

  fallback_purge:
    # Second-chance purge. Runs ONLY when the primary `purge` job's MISS/HIT
    # verification failed AND the trigger was a repository_dispatch publish
    # event (Lovable / external publish hook). Push-triggered runs are
    # covered by the Worker's own auto-purge and the primary job; this
    # fallback exists specifically for the publish-hook path where the
    # Worker version may still be rolling out past the 90s wait window.
    #
    # Behaviour: waits an additional 60s for Worker propagation, force-purges
    # the HTML edge cache by URL (targeted, so it doesn't nuke assets), then
    # re-runs verify-edge-cache.sh. If it still fails, the workflow fails —
    # that is the intended signal that Lovable's Worker deploy is stuck.
    name: Fallback HTML purge (publish dispatch)
    needs: purge
    if: failure() && github.event_name == 'repository_dispatch' && github.event.action == 'lovable-publish'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait additional 60s for Worker propagation
        run: sleep 60

      - name: Force targeted HTML purge (per-URL)
        shell: bash
        run: |
          set +e
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::warning::CF_API_TOKEN or CF_ZONE_ID not set — skipping fallback purge"
            exit 0
          fi
          started=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Purge HTML routes by URL — covers apex + www, http + https.
          payload=$(cat <<'JSON'
          {"files":[
            "https://phlabs.co.uk/","https://phlabs.co.uk/products","https://phlabs.co.uk/compound","https://phlabs.co.uk/about",
            "https://www.phlabs.co.uk/","https://www.phlabs.co.uk/products","https://www.phlabs.co.uk/compound","https://www.phlabs.co.uk/about"
          ]}
          JSON
          )
          resp=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          finished=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ok=false
          if echo "$resp" | grep -q '"success":true'; then ok=true; fi
          printf '{"ts":"%s","kind":"edge_cache_verify","runId":"%s","stage":"cf.purge.fallback","startedAt":"%s","finishedAt":"%s","ok":%s,"trigger":"repository_dispatch:lovable-publish","response":%s}\n' \
            "$finished" "${GITHUB_RUN_ID:-local}" "$started" "$finished" "$ok" \
            "$(echo "$resp" | head -c 800 | jq -Rs . 2>/dev/null || echo '""')" \
            | tee -a ./edge-cache-verify.ndjson
          if [ "$ok" = "false" ]; then
            echo "::error::Fallback per-URL purge failed: $resp"
            exit 1
          fi

      - name: Re-verify edge is serving fresh
        env:
          BASE_URL: https://phlabs.co.uk
          ROUTES: "/ /products /compound /about"
          MAX_RETRIES: "3"
          RETRY_DELAY_SEC: "10"
          LOG_JSON: ./edge-cache-verify.ndjson
        run: |
          sleep 15
          bash scripts/verify-edge-cache.sh

      - name: Upload fallback verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-cache-verify-fallback-${{ github.run_id }}
          path: ./edge-cache-verify.ndjson
          retention-days: 30

  robots_sitemap_purge_probe:
    # Robots/sitemap-specific purge + probe. The primary `purge` job runs
    # purge_everything, but /robots.txt has historically been served with
    # `cache-control: immutable` by the static-asset handler on old builds
    # and pinned in browsers/CDN tiers. This job explicitly purges the
    # robots + sitemap URLs by path (belt-and-braces after purge_everything)
    # and re-runs scripts/probe-sitemap-robots.ts to confirm the live edge
    # now returns the no-store contract. Failure opens a regression issue
    # via the sitemap-robots-cache-probe workflow's `workflow_run` trigger.
    name: Purge /robots.txt + /sitemap*.xml and re-probe
    needs: purge
    # Run even if the primary purge job failed — robots/sitemap freshness
    # is SEO-critical and worth retrying regardless of the HTML edge check.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      issues: write
    env:
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_ZONE_ID_PROHEALTH: ${{ secrets.CF_ZONE_ID_PROHEALTH }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      PROBE_OUT_DIR: sitemap-robots-probe
      PROBE_REPORTS_DIR: reports
      # Manual dispatch inputs → env (default to "both"/"retry_on" for
      # push/repository_dispatch runs where inputs are unset).
      TARGET_DOMAIN: ${{ github.event.inputs.target_domain || 'both' }}
      RUN_MODE: ${{ github.event.inputs.run_mode || 'retry_on' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare reports directory
        run: mkdir -p reports sitemap-robots-probe

      - name: Targeted purge — /robots.txt + /sitemap*.xml (both domains, apex + www)
        shell: bash
        run: |
          set +e
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::warning::CF_API_TOKEN not set — skipping targeted purge"
            exit 0
          fi

          purge_zone() {
            local zone="$1"; local label="$2"; local payload="$3"
            [ -z "$zone" ] && { echo "::warning::zone id for ${label} not set — skipping"; return 0; }
            local started; started=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            local resp stage ok
            if [ "$DRY_RUN" = "true" ]; then
              echo "::notice::DRY-RUN — would POST targeted purge to zone ${zone} (${label}); $(echo "$payload" | jq -r '.files | length') URLs"
              resp='{"success":true,"dry_run":true,"skipped":"cf.purge.robots_sitemap"}'
              stage="cf.purge.robots_sitemap.dry_run"
              ok=true
            else
              resp=$(curl -sS -X POST \
                "https://api.cloudflare.com/client/v4/zones/${zone}/purge_cache" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload")
              stage="cf.purge.robots_sitemap"
              ok=false
              if echo "$resp" | grep -q '"success":true'; then ok=true; fi
            fi
            local finished; finished=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            printf '{"ts":"%s","kind":"edge_cache_verify","runId":"%s","stage":"%s","zone":"%s","startedAt":"%s","finishedAt":"%s","ok":%s,"response":%s}\n' \
              "$finished" "${GITHUB_RUN_ID:-local}" "$stage" "$label" "$started" "$finished" "$ok" \
              "$(echo "$resp" | head -c 800 | jq -Rs . 2>/dev/null || echo '""')" \
              | tee -a ./robots-sitemap-purge.ndjson
            if [ "$ok" = "false" ]; then
              echo "::warning::${label} targeted purge failed: $resp"
            fi
          }

          phlabs_payload=$(cat <<'JSON'
          {"files":[
            "https://phlabs.co.uk/robots.txt",
            "https://phlabs.co.uk/sitemap.xml",
            "https://phlabs.co.uk/sitemap-index.xml",
            "https://phlabs.co.uk/sitemap-0.xml",
            "https://phlabs.co.uk/sitemap-1.xml",
            "https://phlabs.co.uk/sitemap-products.xml",
            "https://phlabs.co.uk/sitemap-articles.xml",
            "https://www.phlabs.co.uk/robots.txt",
            "https://www.phlabs.co.uk/sitemap.xml",
            "https://www.phlabs.co.uk/sitemap-index.xml",
            "https://www.phlabs.co.uk/sitemap-0.xml",
            "https://www.phlabs.co.uk/sitemap-1.xml",
            "https://www.phlabs.co.uk/sitemap-products.xml",
            "https://www.phlabs.co.uk/sitemap-articles.xml"
          ]}
          JSON
          )

          prohealth_payload=$(cat <<'JSON'
          {"files":[
            "https://prohealthpeptides.co.uk/robots.txt",
            "https://prohealthpeptides.co.uk/sitemap.xml",
            "https://prohealthpeptides.co.uk/sitemap-index.xml",
            "https://prohealthpeptides.co.uk/sitemap-0.xml",
            "https://prohealthpeptides.co.uk/sitemap-1.xml",
            "https://prohealthpeptides.co.uk/sitemap-products.xml",
            "https://prohealthpeptides.co.uk/sitemap-articles.xml",
            "https://www.prohealthpeptides.co.uk/robots.txt",
            "https://www.prohealthpeptides.co.uk/sitemap.xml",
            "https://www.prohealthpeptides.co.uk/sitemap-index.xml",
            "https://www.prohealthpeptides.co.uk/sitemap-0.xml",
            "https://www.prohealthpeptides.co.uk/sitemap-1.xml",
            "https://www.prohealthpeptides.co.uk/sitemap-products.xml",
            "https://www.prohealthpeptides.co.uk/sitemap-articles.xml"
          ]}
          JSON
          )

          if [ "$TARGET_DOMAIN" = "both" ] || [ "$TARGET_DOMAIN" = "phlabs.co.uk" ]; then
            purge_zone "$CF_ZONE_ID" "phlabs.co.uk" "$phlabs_payload"
          else
            echo "TARGET_DOMAIN=$TARGET_DOMAIN — skipping phlabs.co.uk purge"
          fi
          if [ "$TARGET_DOMAIN" = "both" ] || [ "$TARGET_DOMAIN" = "prohealthpeptides.co.uk" ]; then
            purge_zone "$CF_ZONE_ID_PROHEALTH" "prohealthpeptides.co.uk" "$prohealth_payload"
          else
            echo "TARGET_DOMAIN=$TARGET_DOMAIN — skipping prohealthpeptides.co.uk purge"
          fi

      - name: Wait 15s for edge propagation
        run: sleep 15

      - name: Re-run sitemap/robots cache probe (with retry / drift diff)
        id: probe
        env:
          # retry_off → 1 attempt only; retry_on → 3 attempts / 10s backoff.
          PROBE_RETRIES: ${{ github.event.inputs.run_mode == 'retry_off' && '1' || '3' }}
          PROBE_RETRY_DELAY_SEC: "10"
        run: |
          set +e
          rc=0
          if [ "$TARGET_DOMAIN" = "both" ] || [ "$TARGET_DOMAIN" = "phlabs.co.uk" ]; then
            echo "::group::probe phlabs.co.uk"
            bun run scripts/probe-sitemap-robots.ts --domain phlabs.co.uk
            [ $? -ne 0 ] && rc=1
            echo "::endgroup::"
          fi
          if [ "$TARGET_DOMAIN" = "both" ] || [ "$TARGET_DOMAIN" = "prohealthpeptides.co.uk" ]; then
            echo "::group::probe prohealthpeptides.co.uk (legacy 301 → apex tolerated)"
            bun run scripts/probe-sitemap-robots.ts --domain prohealthpeptides.co.uk
            [ $? -ne 0 ] && rc=1
            echo "::endgroup::"
          fi
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Emit job step summary
        if: always()
        shell: bash
        run: |
          {
            echo "# 🤖 Robots & Sitemap Probe (run mode: ${RUN_MODE}, target: ${TARGET_DOMAIN})"
            echo ""
            if [ -f reports/probe-summary.md ]; then
              cat reports/probe-summary.md
            else
              echo "_probe-summary.md not generated — probe likely failed to start._"
            fi
            echo ""
            echo "**Artifact:** [Download full report](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}#artifacts)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload probe report + detailed logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-robots-sitemap-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            sitemap-robots-probe/
            reports/
            robots-sitemap-purge.ndjson
          retention-days: 7

      - name: Open GitHub issue on drift
        if: steps.probe.outputs.exit_code != '0' && env.DRY_RUN != 'true'
        uses: actions/github-script@v7
        env:
          TARGET_DOMAIN: ${{ github.event.inputs.target_domain || 'both' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const target = process.env.TARGET_DOMAIN || 'both';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactsUrl = `${runUrl}#artifacts`;

            // Collect drift-diff-*.json files if present.
            const drifts = [];
            const reportsDir = 'reports';
            if (fs.existsSync(reportsDir)) {
              for (const f of fs.readdirSync(reportsDir)) {
                if (/^drift-diff-.*\.json$/.test(f)) {
                  try {
                    const raw = fs.readFileSync(path.join(reportsDir, f), 'utf8');
                    drifts.push({ file: f, json: JSON.parse(raw) });
                  } catch (e) {
                    drifts.push({ file: f, json: { parse_error: String(e) } });
                  }
                }
              }
            }

            const failingUrls = drifts.flatMap((d) =>
              Array.isArray(d.json) ? d.json.map((e) => e.url) : []
            );
            const domains = [...new Set(drifts.map((d) => d.file.replace(/^drift-diff-|\.json$/g, '')))];

            // Best-effort label creation — never fail the step over it.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'cache-drift',
                color: 'B60205',
                description: 'Robots/sitemap edge-cache drift detected by post-deploy probe.',
              });
            } catch (e) { /* label exists or forbidden — ignore */ }

            const ts = new Date().toISOString();
            const domainLabel = domains.length ? domains.join(', ') : target;
            const title = `[Cache Drift] robots/sitemap probe failed — ${domainLabel} — ${ts}`;

            const body = [
              `**Workflow run:** ${runUrl}`,
              `**Artifacts:** ${artifactsUrl}`,
              `**Target domain(s):** ${target}`,
              `**Failing URLs:**`,
              ...(failingUrls.length ? failingUrls.map((u) => `- ${u}`) : ['- (see artifact — no structured drift file produced)']),
              ``,
              `<details><summary>Raw drift report JSON</summary>`,
              ``,
              '```json',
              JSON.stringify(drifts, null, 2).slice(0, 60000),
              '```',
              ``,
              `</details>`,
            ].join('\n');

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cache-drift'],
              });
            } catch (e) {
              // Retry without label if label attach fails.
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Fail if probe reports drift
        if: steps.probe.outputs.exit_code != '0'
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY-RUN — probe reported drift; not failing the workflow (no purge was sent, so HITs are expected)"
            exit 0
          fi
          echo "::error::/robots.txt or /sitemap*.xml is still not compliant after post-deploy purge — see post-deploy-robots-sitemap artifact"
          exit 1

  prerender_recache:
    # After edge purge, warm Prerender.io's cache for the critical routes so
    # the next Googlebot hit returns x-prerender-cache: HIT (~75ms) instead
    # of MISS (fresh origin fetch, ~500-800ms). Non-fatal — never blocks
    # deploy if Prerender.io is slow or the token is missing.
    name: Warm Prerender.io cache for key routes
    needs: purge
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PRERENDER_TOKEN: ${{ secrets.PRERENDER_TOKEN }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: POST /recache for each key URL (desktop + mobile)
        shell: bash
        run: |
          set +e
          if [ -z "$PRERENDER_TOKEN" ]; then
            echo "::warning::PRERENDER_TOKEN not set — skipping Prerender.io recache"
            exit 0
          fi
          urls=(
            "https://phlabs.co.uk/"
            "https://phlabs.co.uk/products"
            "https://phlabs.co.uk/products/bpc-157"
            "https://phlabs.co.uk/compound"
            "https://phlabs.co.uk/about"
            "https://phlabs.co.uk/contact"
          )
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY-RUN — would POST /recache for ${#urls[@]} URLs × 2 devices = $(( ${#urls[@]} * 2 )) calls to api.prerender.io"
            for u in "${urls[@]}"; do
              for device in desktop mobile; do
                echo "dry-run recache $device $u"
              done
            done
            exit 0
          fi
          for u in "${urls[@]}"; do
            for device in desktop mobile; do
              code=$(curl -sS -o /tmp/recache-body -w "%{http_code}" --max-time 20 \
                -X POST https://api.prerender.io/recache \
                -H "Content-Type: application/json" \
                --data "$(jq -n --arg t "$PRERENDER_TOKEN" --arg u "$u" --arg d "$device" \
                  '{prerenderToken:$t, url:$u, adaptiveType:$d}')")
              echo "recache $device $u → HTTP $code"
              if [ "$code" != "200" ] && [ "$code" != "201" ]; then
                echo "::warning::recache $device $u returned $code: $(head -c 200 /tmp/recache-body)"
              fi
            done
          done
          echo "Prerender.io recache complete for ${#urls[@]} URLs"






