name: Post-Deploy Edge Purge

# Automatically purge the Cloudflare edge cache after a successful production
# deploy. Do not warm HTML shells here: public HTML is intentionally no-store,
# and warming used to repopulate the old edge HTML cache rule.

on:
  workflow_run:
    workflows: ["Deploy Cloudflare Worker"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: post-deploy-purge
  cancel-in-progress: false

jobs:
  purge:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare edge cache (scoped — HTML + feeds only, phlabs.co.uk zone)
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
          CF_ZONE_ID_LEGACY: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN_LEGACY: ${{ secrets.CF_API_TOKEN }}
        run: |
          CF_ZONE_ID="${CF_ZONE_ID:-${CF_ZONE_ID_LEGACY:-}}"
          CF_API_TOKEN="${CF_API_TOKEN:-${CF_API_TOKEN_LEGACY:-}}"
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Cloudflare zone/token secret missing"
            exit 1
          fi
          # Scoped purge only — never purge_everything. Hashed /assets/* are
          # immutable and must survive every deploy; wiping them 404s open
          # sessions. See .lovable/memory/post-publish-edge-purge.md.
          resp=$(curl -sS -o /tmp/purge.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://phlabs.co.uk/","https://phlabs.co.uk/products","https://phlabs.co.uk/sitemap.xml","https://phlabs.co.uk/robots.txt","https://phlabs.co.uk/llms.txt","https://phlabs.co.uk/google-merchant-feed.xml","https://phlabs.co.uk/google-merchant-feed-free.xml","https://phlabs.co.uk/feed.xml"]}')
          echo "HTTP $resp"
          cat /tmp/purge.json
          if [ "$resp" != "200" ]; then
            echo "::error::Purge failed"
            exit 1
          fi
          echo "✅ Edge cache purged (scoped)"

      - name: Verify build-id tags and versioned assets after purge
        run: |
          set -euo pipefail
          # Write to file — the live HTML contains null bytes (worker inline
          # scripts) which bash $(...) truncates. `grep -a` treats it as text.
          curl -fsSL -H "User-Agent: PHLabs-PostDeploy/1.0" https://phlabs.co.uk/ -o /tmp/live.html
          grep -aq 'name="build-id"' /tmp/live.html
          grep -aq 'window.__BUILD_ID__' /tmp/live.html
          grep -aEq "/(assets|_build)/[^\"'<>]+\.(js|css)[^\"'<>]*[?&]v=" /tmp/live.html
          echo "✅ Build ID and versioned asset URLs present"

      - name: Verify homepage no-store after purge
        run: |
          set -euo pipefail
          headers=$(curl -sSI -H "User-Agent: PHLabs-PostDeploy/1.0" https://phlabs.co.uk/)
          echo "$headers" | grep -i '^cache-control:'
          echo "$headers" | grep -i '^cdn-cache-control:'
          echo "$headers" | grep -i '^cache-control:' | grep -qi 'no-store'
          echo "$headers" | grep -i '^cdn-cache-control:' | grep -qi 'no-store'
