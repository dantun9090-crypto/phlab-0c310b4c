name: Post-Deploy Edge Purge

# Automatically purge the Cloudflare edge cache and warm critical paths
# after a successful production deploy. Chains onto the existing worker
# deploy workflow so no manual step is required.

on:
  workflow_run:
    workflows: ["deploy-worker"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: post-deploy-purge
  cancel-in-progress: false

jobs:
  purge:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare edge cache (phlabs.co.uk zone)
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CF_ZONE_ID or CF_API_TOKEN secret missing"
            exit 1
          fi
          resp=$(curl -sS -o /tmp/purge.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "HTTP $resp"
          cat /tmp/purge.json
          if [ "$resp" != "200" ]; then
            echo "::error::Purge failed"
            exit 1
          fi
          echo "✅ Edge cache purged"

      - name: Warm critical paths
        run: |
          set +e
          for path in "/" "/products" "/about" "/contact" "/resources"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: PHLabs-Warm/1.0" \
              "https://phlabs.co.uk${path}")
            echo "WARM ${path} -> ${code}"
          done
