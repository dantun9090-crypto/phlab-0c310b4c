name: Pre-release route check (staging)

# Blocks merges into main when the route tree returns any non-200, unauthorized
# noindex, or canonical-uniqueness violation. Runs against a local dev server by
# default so PR checks are not blocked by the authenticated preview URL.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL (defaults to local dev server)"
        required: false
        default: "http://127.0.0.1:8080"
  pull_request:
    branches: [main]
    paths:
      - "src/routes/**"
      - "src/server.ts"
      - "src/lib/known-roots.ts"
      - "cloudflare/worker.js"
      - "wrangler.jsonc"
      - "scripts/check-prod-routes.mjs"
      - "scripts/check-canonicals.mjs"

permissions:
  contents: read

jobs:
  staging-routes:
    name: Staging route + canonical check
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    env:
      BASE: ${{ github.event.inputs.base_url || 'http://127.0.0.1:8080' }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install deps
        run: bash scripts/ci-bun-install.sh

      - name: Start local dev server
        if: startsWith(env.BASE, 'http://127.0.0.1') || startsWith(env.BASE, 'http://localhost')
        run: |
          (bun run dev --host 127.0.0.1 --port 8080 > server.log 2>&1 &)
          for i in $(seq 1 120); do
            if curl -fsS -o /dev/null "$BASE/"; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start"; tail -n 200 server.log; exit 1

      - name: Wait for remote preview to propagate
        if: ${{ !(startsWith(env.BASE, 'http://127.0.0.1') || startsWith(env.BASE, 'http://localhost')) }}
        run: sleep 60

      - name: Crawl status codes + noindex policy
        id: routes
        run: |
          set +e
          REPORT_PATH=/tmp/prod-routes-report.json \
            BASE="$BASE" node scripts/check-prod-routes.mjs | tee /tmp/prod-routes.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Crawl canonical uniqueness
        id: canonicals
        run: |
          set +e
          CANONICAL_REPORT_PATH=/tmp/canonicals-report.json \
            BASE="$BASE" node scripts/check-canonicals.mjs | tee /tmp/canonicals.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Render Markdown report
        if: always()
        run: |
          node scripts/render-route-audit-md.mjs \
            --routes /tmp/prod-routes-report.json \
            --canonicals /tmp/canonicals-report.json \
            --title "Staging route audit ($BASE)" \
            --out /tmp/route-audit.md
          cat /tmp/route-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-route-audit-${{ github.sha }}
          path: |
            /tmp/prod-routes-report.json
            /tmp/canonicals-report.json
            /tmp/prod-routes.log
            /tmp/canonicals.log
            /tmp/route-audit.md
            server.log
          retention-days: 30

      - name: Sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/route-audit.md', 'utf8');
            const marker = '<!-- staging-route-audit -->';
            const fullBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: fullBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: fullBody });
            }

      - name: Fail if staging is broken
        if: steps.routes.outputs.exit_code != '0' || steps.canonicals.outputs.exit_code != '0'
        run: |
          echo "::error::Staging route audit failed — see step summary and PR comment."
          exit 1
