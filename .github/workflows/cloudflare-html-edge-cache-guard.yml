name: Cloudflare HTML Edge-Cache Guard

# Fails CI (and sends a Slack alert) if any Cloudflare cache rule for `/` or
# `/products` on the phlabs.co.uk zone is enabled with a positive edge TTL —
# i.e. the historical "HTML edge cache — 4h TTL" rule has been re-enabled.
#
# Runs:
#   - after every successful production deploy
#   - after the post-deploy purge
#   - hourly (safety net if someone toggles the rule in the dashboard)
#   - on demand via workflow_dispatch

on:
  workflow_run:
    workflows:
      - "Deploy Cloudflare Worker"
      - "Post-Deploy Edge Purge"
    types: [completed]
    branches: [main]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: cf-html-edge-cache-guard
  cancel-in-progress: false

jobs:
  guard:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify no HTML edge-cache rule for / or /products
        id: guard
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 .github/workflows/scripts/guard-html-edge-cache.py

      - name: Slack alert on regression
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set — skipping Slack notify"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(cat <<JSON
          {
            "text": "🚨 *Cloudflare HTML edge-cache rule re-enabled on phlabs.co.uk* for \`/\` or \`/products\`. Public HTML must stay \`no-store\`. <${RUN_URL}|View run>."
          }
          JSON
          )
          curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || true
