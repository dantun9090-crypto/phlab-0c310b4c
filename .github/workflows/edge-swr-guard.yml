name: Edge SWR guard

# Post-publish sanity check: verifies the live Cloudflare edge is serving
# `Cloudflare-CDN-Cache-Control: ...stale-while-revalidate=60` on the apex
# and www hosts. If either host still advertises the old 86400s SWR (or
# any value other than 60), the job FAILS — blocking the deploy from being
# marked green so we don't silently pin day-old HTML at the edge again.
#
# Runs automatically after every push to main (post-publish) and can be
# dispatched manually to re-verify after a Worker redeploy.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Hourly drift check — catches out-of-band Worker rollbacks.
    - cron: "17 * * * *"

concurrency:
  group: edge-swr-guard
  cancel-in-progress: false

jobs:
  verify:
    name: Verify stale-while-revalidate=60 on live edge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_SWR: "60"
      CF_ZONE_ID: ed093ef4578e8e3568e26c3e979558c6
      CF_ACCOUNT_ID: 2e52fa1ba0b76b79976789b02cf9e80a
      WORKER_NAME: phlabs-prerender
      WORKER_SRC: cloudflare/phlabs-prerender.mjs
    steps:
      - uses: actions/checkout@v4

      - name: Probe edge headers and enforce SWR=60
        id: probe
        shell: bash
        run: |
          set -euo pipefail
          bash .github/workflows/scripts/probe-swr.sh
          echo "swr_ok=true" >> "$GITHUB_OUTPUT"

      # ---------- Auto-remediation ----------
      # If the probe fails, redeploy the Worker from source and purge the
      # edge cache. Then re-probe. If it still fails, the job fails and
      # the "Open issue on failure" step files a ticket.
      - name: Auto-remediate — redeploy Worker + purge edge
        if: failure() && steps.probe.outcome == 'failure'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2e52fa1ba0b76b79976789b02cf9e80a
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set — cannot auto-remediate."
            exit 1
          fi

          workdir="$(mktemp -d)"
          cp "$WORKER_SRC" "$workdir/worker.mjs"
          cat > "$workdir/wrangler.toml" <<TOML
          name = "${WORKER_NAME}"
          main = "worker.mjs"
          compatibility_date = "2025-01-01"
          TOML

          echo "::group::Redeploy ${WORKER_NAME}"
          (cd "$workdir" && npx --yes wrangler@latest deploy)
          echo "::endgroup::"

          echo "::group::Purge Cloudflare edge cache (purge_everything)"
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/purge.json
          echo
          grep -q '"success":true' /tmp/purge.json
          echo "::endgroup::"

          echo "Waiting 30s for Worker route propagation…"
          sleep 30

      - name: Re-verify after auto-remediation
        if: failure() && steps.probe.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          bash .github/workflows/scripts/probe-swr.sh
          {
            echo ""
            echo "### 🛠 Auto-remediation succeeded"
            echo "Redeployed \`${WORKER_NAME}\` and purged edge cache. Live SWR is now \`${EXPECTED_SWR}\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open issue on failure
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Edge SWR guard failed on ${sha}`,
              labels: ['infra', 'cloudflare', 'post-deploy'],
              body: [
                `Live edge did not advertise \`stale-while-revalidate=60\` on \`Cloudflare-CDN-Cache-Control\`.`,
                ``,
                `**Build:** \`${context.sha}\``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Fix: redeploy the \`phlabs-prerender\` Worker from \`cloudflare/phlabs-prerender.mjs\` (SWR is set to 60 there) and purge the Cloudflare edge cache.`,
              ].join('\n'),
            });
