name: Edge SWR guard

# Post-publish + drift sanity check for phlabs.co.uk.
# Verifies live edge advertises `Cloudflare-CDN-Cache-Control: ...stale-while-revalidate=60`
# on apex and www. If not:
#   1. Attempts `wrangler rollback --yes` (revert to last known good deployment)
#   2. Falls back to `wrangler deploy` if rollback fails/unavailable
#   3. Runs a SCOPED cache purge (only phlabs.co.uk/* + www.phlabs.co.uk/*, never purge_everything)
#   4. Re-probes and reports
#
# Retry counter is persisted in branch `state/swr-guard` (file `.swr-guard-state.json`)
# and capped at MAX_AUTO_REDEPLOYS to prevent runaway loops. Counter resets on
# success or when the UTC date changes.
#
# Slack notifications: pushed to SLACK_WEBHOOK_URL. If the secret is unset the
# payload is printed to workflow logs instead — the job never fails on missing Slack.

on:
  # Schedule + push triggers disabled 2026-07-08: HTML shells are now
  # `no-store` at the edge (see src/server.ts) to eliminate the recurring
  # "need manual Cloudflare purge after publish" issue. The SWR=60
  # expectation is no longer applicable. Kept as manual-dispatch only in
  # case we ever re-enable HTML edge caching.
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: "Bypass probe and force remediation (still respects MAX_AUTO_REDEPLOYS)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: edge-swr-guard
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  guard:
    name: Verify SWR=60 on live edge (apex + www)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_SWR: "60"
      MAX_AUTO_REDEPLOYS: "3"
      WORKER_NAME: phlabs-prerender
      WORKER_SRC: cloudflare/phlabs-prerender.mjs
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      STATE_BRANCH: state/swr-guard
      STATE_FILE: .swr-guard-state.json
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      HOSTS: "https://phlabs.co.uk/ https://www.phlabs.co.uk/"
    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v5

      - name: Install tooling (jq + wrangler)
        shell: bash
        run: |
          set -e
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi
          npm i -g wrangler@latest >/dev/null 2>&1

      - name: Chmod probe scripts
        shell: bash
        run: chmod +x scripts/probe-swr.sh scripts/probe-client-errors.sh

      # ---- Load retry-counter state from state branch ----
      - name: Load retry state
        id: state
        shell: bash
        run: |
          set -euo pipefail
          today="$(date -u +%Y-%m-%d)"
          count=0
          if git ls-remote --exit-code --heads origin "${STATE_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${STATE_BRANCH}:${STATE_BRANCH}" --depth=1 || true
            raw="$(git show "${STATE_BRANCH}:${STATE_FILE}" 2>/dev/null || echo '{}')"
            stored_date="$(printf '%s' "$raw" | jq -r '.date // ""')"
            stored_count="$(printf '%s' "$raw" | jq -r '.count // 0')"
            if [ "$stored_date" = "$today" ]; then count="$stored_count"; fi
          fi
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "today=${today}"  >> "$GITHUB_OUTPUT"
          echo "Current retry counter: ${count}/${MAX_AUTO_REDEPLOYS} (date=${today})"

      # ---- Probe SWR (apex + www) and client-errors in parallel ----
      - name: Run probes in parallel (SWR + client errors)
        id: probe
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set +e
          mkdir -p /tmp/swr

          # Fire SWR probes for each host in the background
          pids=()
          for host in $HOSTS; do
            name="$(echo "$host" | sed -E 's~https?://~~; s~/.*$~~')"
            ( scripts/probe-swr.sh "$host" "$EXPECTED_SWR" > "/tmp/swr/${name}.json" ; echo $? > "/tmp/swr/${name}.rc" ) &
            pids+=($!)
          done
          # Client-error probe in parallel
          ( scripts/probe-client-errors.sh 5 5 > /tmp/swr/client-errors.json ; echo $? > /tmp/swr/client-errors.rc ) &
          pids+=($!)
          for p in "${pids[@]}"; do wait "$p"; done

          overall=0
          statuses=()
          for host in $HOSTS; do
            name="$(echo "$host" | sed -E 's~https?://~~; s~/.*$~~')"
            rc="$(cat /tmp/swr/${name}.rc 2>/dev/null || echo 2)"
            status="$(jq -r '.status' /tmp/swr/${name}.json 2>/dev/null || echo UNKNOWN)"
            statuses+=("swr:${name}:${status}")
            echo "::group::SWR $host ($status, rc=$rc)"; cat /tmp/swr/${name}.json; echo; echo "::endgroup::"
            [ "$rc" -ne 0 ] && overall=$rc
          done

          ce_rc="$(cat /tmp/swr/client-errors.rc 2>/dev/null || echo 2)"
          ce_status="$(jq -r '.status' /tmp/swr/client-errors.json 2>/dev/null || echo UNKNOWN)"
          ce_count="$(jq -r '.error_count' /tmp/swr/client-errors.json 2>/dev/null || echo 0)"
          ce_paths="$(jq -c '.sample_paths' /tmp/swr/client-errors.json 2>/dev/null || echo '[]')"
          statuses+=("client_errors:${ce_status}(${ce_count})")
          echo "::group::client-errors probe (${ce_status}, rc=$ce_rc)"; cat /tmp/swr/client-errors.json; echo; echo "::endgroup::"
          [ "$ce_rc" -eq 1 ] && overall=1  # exit 2 = probe error → do NOT trigger remediation

          jq -s '.' /tmp/swr/apex.phlabs.co.uk.json /tmp/swr/www.phlabs.co.uk.json 2>/dev/null > /tmp/swr/all.json || \
            jq -s '.' /tmp/swr/phlabs.co.uk.json /tmp/swr/www.phlabs.co.uk.json > /tmp/swr/all.json

          echo "overall_rc=${overall}"                     >> "$GITHUB_OUTPUT"
          echo "summary=$(IFS=,; echo "${statuses[*]}")"   >> "$GITHUB_OUTPUT"
          echo "client_error_count=${ce_count}"            >> "$GITHUB_OUTPUT"
          echo "client_error_status=${ce_status}"          >> "$GITHUB_OUTPUT"
          echo "client_error_paths=${ce_paths}"            >> "$GITHUB_OUTPUT"

          if [ "${{ github.event.inputs.force_redeploy }}" = "true" ]; then
            echo "force=true"           >> "$GITHUB_OUTPUT"
            echo "need_remediate=true"  >> "$GITHUB_OUTPUT"
          elif [ $overall -ne 0 ]; then
            echo "force=false"          >> "$GITHUB_OUTPUT"
            echo "need_remediate=true"  >> "$GITHUB_OUTPUT"
          else
            echo "force=false"          >> "$GITHUB_OUTPUT"
            echo "need_remediate=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0


      # ---- Slack: initial detection ----
      - name: Notify Slack — probe result
        if: steps.probe.outputs.need_remediate == 'true'
        shell: bash
        env:
          COUNTER: ${{ steps.state.outputs.count }}
        run: |
          set -euo pipefail
          color="#ffb300"
          title="⚠️ Edge SWR mismatch detected"
          if [ "${{ steps.probe.outputs.force }}" = "true" ]; then
            title="🔧 Manual force_redeploy triggered"
          fi
          probe_json="$(cat /tmp/swr/all.json)"
          ce_json="$(cat /tmp/swr/client-errors.json 2>/dev/null || echo '{}')"
          payload="$(jq -cn \
            --arg color "$color" \
            --arg title "$title" \
            --arg summary "${{ steps.probe.outputs.summary }}" \
            --arg counter "${COUNTER}/${MAX_AUTO_REDEPLOYS}" \
            --arg run "$RUN_URL" \
            --arg ce_status "${{ steps.probe.outputs.client_error_status }}" \
            --arg ce_count "${{ steps.probe.outputs.client_error_count }}" \
            --arg ce_paths "${{ steps.probe.outputs.client_error_paths }}" \
            --argjson probes "$probe_json" \
            --argjson client_errors "$ce_json" \
            '{attachments:[{color:$color,title:$title,fields:[
              {title:"Probe summary",value:$summary,short:false},
              {title:"Retry counter",value:$counter,short:true},
              {title:"Run",value:$run,short:true},
              {title:"Client errors",value:("\($ce_status) — count=\($ce_count) paths=\($ce_paths)"),short:false},
              {title:"Probes",value:($probes|tostring),short:false},
              {title:"Client-error probe",value:($client_errors|tostring),short:false}
            ]}]}')"
          bash .github/workflows/scripts/slack-notify.sh "$payload" "probe-detected"

      # ---- Enforce max retries BEFORE remediating ----
      - name: Check retry cap
        id: cap
        if: steps.probe.outputs.need_remediate == 'true'
        shell: bash
        env:
          COUNTER: ${{ steps.state.outputs.count }}
        run: |
          if [ "$COUNTER" -ge "$MAX_AUTO_REDEPLOYS" ]; then
            echo "over_cap=true" >> "$GITHUB_OUTPUT"
            echo "::error::Auto-remediation cap reached (${COUNTER}/${MAX_AUTO_REDEPLOYS}). Manual intervention required."
          else
            echo "over_cap=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack — cap reached (critical)
        if: steps.cap.outputs.over_cap == 'true'
        shell: bash
        env:
          COUNTER: ${{ steps.state.outputs.count }}
        run: |
          payload="$(jq -cn \
            --arg counter "${COUNTER}/${MAX_AUTO_REDEPLOYS}" \
            --arg run "$RUN_URL" \
            '{attachments:[{color:"#d32f2f",title:"🚨 SWR guard cap reached — manual intervention required",
              fields:[{title:"Retry counter",value:$counter,short:true},{title:"Run",value:$run,short:true}]}]}')"
          bash .github/workflows/scripts/slack-notify.sh "$payload" "cap-reached"

      # ---- Remediation: rollback first, fall back to deploy ----
      - name: Remediate — rollback (preferred) or redeploy
        id: remediate
        if: steps.probe.outputs.need_remediate == 'true' && steps.cap.outputs.over_cap == 'false'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set +e
          [ -n "$CLOUDFLARE_API_TOKEN" ] || { echo "::error::CF_API_TOKEN unset"; exit 1; }

          workdir="$(mktemp -d)"
          cp "$WORKER_SRC" "$workdir/worker.mjs"
          cat > "$workdir/wrangler.toml" <<TOML
          name = "${WORKER_NAME}"
          main = "worker.mjs"
          compatibility_date = "2025-01-01"
          TOML

          method="unknown"
          echo "::group::Attempt wrangler rollback"
          (cd "$workdir" && wrangler rollback --name "$WORKER_NAME" --yes 2>&1) | tee /tmp/rollback.log
          rb_rc=${PIPESTATUS[0]}
          echo "::endgroup::"

          if [ $rb_rc -eq 0 ]; then
            method="rollback"
            echo "✅ Rollback succeeded"
          else
            echo "⚠️ Rollback failed/unavailable — falling back to deploy"
            echo "::group::wrangler deploy"
            (cd "$workdir" && wrangler deploy 2>&1) | tee /tmp/deploy.log
            dp_rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ $dp_rc -eq 0 ]; then
              method="deploy"
              echo "✅ Deploy succeeded"
            else
              method="failed"
              echo "::error::Both rollback and deploy failed"
              echo "method=${method}" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "method=${method}" >> "$GITHUB_OUTPUT"

          # ---- Scoped cache purge (NEVER purge_everything) ----
          echo "::group::Scoped cache purge"
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://phlabs.co.uk/","https://phlabs.co.uk/products","https://phlabs.co.uk/about","https://www.phlabs.co.uk/","https://www.phlabs.co.uk/products","https://www.phlabs.co.uk/about"]}' \
            | tee /tmp/purge.json
          echo
          grep -q '"success":true' /tmp/purge.json || { echo "::error::Scoped purge failed"; exit 1; }
          echo "::endgroup::"

          echo "Waiting 30s for propagation…"
          sleep 30

      # ---- Post-remediation smoke test (homepage + products + about) ----
      - name: Post-remediation smoke test
        id: smoke
        if: steps.remediate.outcome == 'success'
        shell: bash
        run: |
          set +e
          fail=0
          urls=("https://phlabs.co.uk/" "https://phlabs.co.uk/products" "https://phlabs.co.uk/about")
          results=()
          for u in "${urls[@]}"; do
            code=$(curl -sSL --max-time 20 -o /tmp/body.html -w '%{http_code}' \
              -H 'cache-control: no-cache' -A 'phlabs-swr-guard-smoke/1.0' "$u")
            has_ex="no"
            grep -qiE 'client_exception|Uncaught (Error|TypeError)' /tmp/body.html && has_ex="yes"
            line="${u} → HTTP ${code} (client_exception=${has_ex})"
            echo "$line"
            results+=("$line")
            if [ "$code" != "200" ] || [ "$has_ex" = "yes" ]; then fail=1; fi
          done
          printf '%s\n' "${results[@]}" > /tmp/smoke.txt
          if [ $fail -ne 0 ]; then
            echo "::error::Smoke test failed — attempting immediate rollback"
            (cd "$(mktemp -d)" && \
              cp "$WORKER_SRC" worker.mjs && \
              printf 'name = "%s"\nmain = "worker.mjs"\ncompatibility_date = "2025-01-01"\n' "$WORKER_NAME" > wrangler.toml && \
              CLOUDFLARE_API_TOKEN="${{ secrets.CF_API_TOKEN }}" CLOUDFLARE_ACCOUNT_ID="${{ secrets.CF_ACCOUNT_ID }}" \
              wrangler rollback --name "$WORKER_NAME" --yes) || echo "::warning::Emergency rollback also failed"
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "verdict=pass" >> "$GITHUB_OUTPUT"


      - name: Notify Slack — remediation triggered
        if: steps.remediate.outcome != 'skipped'
        shell: bash
        env:
          METHOD: ${{ steps.remediate.outputs.method }}
          COUNTER: ${{ steps.state.outputs.count }}
        run: |
          color="#ffb300"; title="🛠 Remediation applied (${METHOD})"
          if [ "$METHOD" = "failed" ]; then color="#d32f2f"; title="❌ Remediation failed"; fi
          payload="$(jq -cn \
            --arg color "$color" --arg title "$title" \
            --arg method "$METHOD" \
            --arg counter "${COUNTER}/${MAX_AUTO_REDEPLOYS}" \
            --arg run "$RUN_URL" \
            '{attachments:[{color:$color,title:$title,fields:[
              {title:"Method",value:$method,short:true},
              {title:"Counter",value:$counter,short:true},
              {title:"Run",value:$run,short:false}
            ]}]}')"
          bash .github/workflows/scripts/slack-notify.sh "$payload" "remediated"

      # ---- Re-probe after remediation ----
      - name: Re-verify after remediation
        id: reprobe
        if: steps.remediate.outcome == 'success'
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/swr2
          overall=0
          for host in $HOSTS; do
            name="$(echo "$host" | sed -E 's~https?://~~; s~/.*$~~')"
            out="/tmp/swr2/${name}.json"
            scripts/probe-swr.sh "$host" "$EXPECTED_SWR" > "$out"
            rc=$?
            echo "::group::Re-probe $host"
            cat "$out"; echo "::endgroup::"
            if [ $rc -ne 0 ]; then overall=$rc; fi
          done
          jq -s '.' /tmp/swr2/*.json > /tmp/swr2/all.json
          echo "overall_rc=${overall}" >> "$GITHUB_OUTPUT"
          if [ $overall -eq 0 ]; then echo "verify=pass" >> "$GITHUB_OUTPUT"; else echo "verify=fail" >> "$GITHUB_OUTPUT"; fi
          exit 0

      # ---- Persist new retry counter ----
      - name: Persist retry counter
        if: always() && steps.probe.outputs.need_remediate == 'true' && steps.cap.outputs.over_cap == 'false'
        shell: bash
        env:
          COUNTER: ${{ steps.state.outputs.count }}
          TODAY: ${{ steps.state.outputs.today }}
          VERIFY: ${{ steps.reprobe.outputs.verify }}
        run: |
          set -euo pipefail
          if [ "$VERIFY" = "pass" ]; then new=0; else new=$((COUNTER+1)); fi
          echo "New counter: ${new}/${MAX_AUTO_REDEPLOYS}"

          tmp="$(mktemp -d)"; cd "$tmp"
          git init -q -b "$STATE_BRANCH"
          git config user.email "swr-guard@phlabs.co.uk"
          git config user.name  "swr-guard-bot"
          jq -cn --arg d "$TODAY" --argjson c "$new" \
            '{date:$d,count:$c,updated_at:(now|todate)}' > "$STATE_FILE"
          git add "$STATE_FILE"
          git commit -q -m "swr-guard: counter=${new} (${TODAY})"
          git push -q --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            "HEAD:${STATE_BRANCH}"

      - name: Notify Slack — final verify
        if: steps.reprobe.outcome != 'skipped'
        shell: bash
        env:
          VERIFY: ${{ steps.reprobe.outputs.verify }}
          METHOD: ${{ steps.remediate.outputs.method }}
          COUNTER: ${{ steps.state.outputs.count }}
        run: |
          if [ "$VERIFY" = "pass" ]; then color="#2e7d32"; title="✅ SWR=60 restored"; else color="#d32f2f"; title="❌ SWR still wrong after remediation"; fi
          probe="$(cat /tmp/swr2/all.json)"
          payload="$(jq -cn \
            --arg color "$color" --arg title "$title" \
            --arg method "${METHOD:-n/a}" \
            --arg counter "${COUNTER}/${MAX_AUTO_REDEPLOYS}" \
            --arg run "$RUN_URL" \
            --argjson probes "$probe" \
            '{attachments:[{color:$color,title:$title,fields:[
              {title:"Method",value:$method,short:true},
              {title:"Counter",value:$counter,short:true},
              {title:"Run",value:$run,short:false},
              {title:"Probes",value:($probes|tostring),short:false}
            ]}]}')"
          bash .github/workflows/scripts/slack-notify.sh "$payload" "verify-${VERIFY}"

      # ---- Workflow summary ----
      - name: Workflow summary
        if: always()
        shell: bash
        env:
          COUNTER: ${{ steps.state.outputs.count }}
          PROBE_SUMMARY: ${{ steps.probe.outputs.summary }}
          NEED: ${{ steps.probe.outputs.need_remediate }}
          FORCE: ${{ steps.probe.outputs.force }}
          METHOD: ${{ steps.remediate.outputs.method }}
          VERIFY: ${{ steps.reprobe.outputs.verify }}
          OVER_CAP: ${{ steps.cap.outputs.over_cap }}
        run: |
          {
            echo "## Edge SWR Guard"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Expected SWR | \`${EXPECTED_SWR}\` |"
            echo "| Probe summary | \`${PROBE_SUMMARY:-n/a}\` |"
            echo "| Force redeploy | \`${FORCE:-false}\` |"
            echo "| Remediation needed | \`${NEED:-false}\` |"
            echo "| Over retry cap | \`${OVER_CAP:-false}\` |"
            echo "| Remediation method | \`${METHOD:-none}\` |"
            echo "| Post-verify | \`${VERIFY:-n/a}\` |"
            echo "| Retry counter (entry) | \`${COUNTER}/${MAX_AUTO_REDEPLOYS}\` |"
            echo "| Slack configured | \`$([ -n "${SLACK_WEBHOOK_URL:-}" ] && echo yes || echo no)\` |"
            echo "| Run | ${RUN_URL} |"
            echo ""
            if [ -s /tmp/swr/all.json ]; then
              echo "### Initial probes"; echo '```json'; cat /tmp/swr/all.json; echo '```'
            fi
            if [ -s /tmp/swr2/all.json ]; then
              echo "### Post-remediation probes"; echo '```json'; cat /tmp/swr2/all.json; echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if unresolved
        if: always()
        shell: bash
        env:
          NEED: ${{ steps.probe.outputs.need_remediate }}
          VERIFY: ${{ steps.reprobe.outputs.verify }}
          OVER_CAP: ${{ steps.cap.outputs.over_cap }}
        run: |
          if [ "$OVER_CAP" = "true" ]; then exit 1; fi
          if [ "$NEED" = "true" ] && [ "$VERIFY" != "pass" ]; then exit 1; fi
          exit 0
