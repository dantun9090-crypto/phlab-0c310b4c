name: /robots.txt & /sitemap*.xml cache probe

# Runs on every push to main (post-build) and on completion of Release /
# post-deploy workflows, plus every 30 min as a safety net. Asserts that
# /robots.txt and every /sitemap*.xml served by the live edge return
# `cdn-cache-control: no-store` with the intended browser cache-control
# (short max-age, no immutable, no s-maxage). A stale robots or sitemap
# stops Google from discovering new inventory — this is the CI guardrail.

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_run:
    workflows: ["Release", "Post-deploy security check", "HTML shell no-cache guard"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"

jobs:
  sitemap-robots-cache-probe:
    name: /robots.txt & sitemap*.xml must be CDN no-store
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    env:
      PROBE_BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
      PROBE_OUT_DIR: sitemap-robots-probe
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Give CF/origin a moment after a fresh deploy so we probe the
      # newly-published edge, not the version still propagating.
      - name: Wait for edge propagation
        if: github.event_name == 'push' || github.event_name == 'workflow_run'
        run: sleep 90

      - name: Probe
        id: probe
        run: |
          set +e
          bun run scripts/probe-sitemap-robots.ts
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sitemap-robots-probe-${{ github.sha }}
          path: sitemap-robots-probe/
          retention-days: 30

      - name: Open issue on regression
        if: steps.probe.outputs.exit_code != '0' && github.event_name != 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `robots/sitemap edge-cache regression on ${sha}`,
              labels: ['regression', 'cache', 'seo', 'post-deploy', 'critical'],
              body: [
                `/robots.txt or /sitemap*.xml is not being served with the`,
                `expected cache contract (CDN no-store + short browser max-age).`,
                ``,
                `A stale robots or sitemap stops Google from discovering new`,
                `inventory — treat as SEO-critical.`,
                ``,
                `See the \`sitemap-robots-probe-${context.sha}\` artifact for the`,
                `exact headers observed.`,
                ``,
                `Common causes:`,
                `- /robots.txt served from public/ as a hashed static asset`,
                `  (immutable, 1 year) — src/server.ts must apply the`,
                `  dynamic-asset policy BEFORE the static handler.`,
                `- Cloudflare cache rule rewriting cdn-cache-control on *.xml.`,
                ``,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });

      - name: Fail on regression
        if: steps.probe.outputs.exit_code != '0'
        run: exit 1
