name: canary

on:
  schedule:
    # Every 15 min — catch stale-asset / blank-page regressions fast.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to canary (default https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"
      force_alert:
        description: "Force Slack alert regardless of threshold"
        required: false
        default: "false"

concurrency:
  group: canary-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Restore canary state
        id: state-restore
        uses: actions/cache/restore@v4
        with:
          path: .canary-state
          key: canary-state-v2

      - name: Run canary
        id: run
        continue-on-error: true
        env:
          CANARY_BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
          CANARY_PATHS: "/,/products,/login,/admin"
        run: node scripts/canary-check.mjs

      - name: Evaluate rolling failure window
        id: eval
        env:
          FAIL_THRESHOLD: "3"
          WINDOW_RUNS: "6"
          ROLLBACK_BOOT_BAD_THRESHOLD: "2"
          RUN_OUTCOME: ${{ steps.run.outcome }}
          FORCE_ALERT: ${{ github.event.inputs.force_alert }}
          BUILD_ID: ${{ steps.run.outputs.build_id }}
          BOOT_BAD_COUNT: ${{ steps.run.outputs.boot_bad_count }}
          FAILURE_COUNT: ${{ steps.run.outputs.failure_count }}
        run: node scripts/canary-window-eval.mjs

      - name: Save canary state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .canary-state
          key: canary-state-v2-${{ github.run_id }}

      - name: Notify Slack (threshold exceeded, deduped per build-id)
        if: steps.eval.outputs.should_alert == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=":rotating_light: phlabs.co.uk canary threshold exceeded — ${{ steps.eval.outputs.summary }}"
          if [ "${{ steps.eval.outputs.rollback_recommended }}" = "true" ]; then
            MSG="$MSG :warning: *ROLLBACK RECOMMENDED* — publish-hold flag set for build ${{ steps.eval.outputs.build_id }}"
          fi
          MSG="$MSG — run ${{ github.run_id }}"
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MSG\"}" \
            "$SLACK_WEBHOOK_URL" || true

      - name: Flag publish-hold (rollback recommended)
        if: steps.eval.outputs.rollback_recommended == 'true' && env.PUBLISH_HOLD_SECRET != ''
        env:
          PUBLISH_HOLD_URL: https://phlabs.co.uk/api/public/publish-hold
          PUBLISH_HOLD_SECRET: ${{ secrets.PUBLISH_HOLD_SECRET }}
          BUILD_ID: ${{ steps.eval.outputs.build_id }}
          REASON: ${{ steps.eval.outputs.summary }}
          BOOT_BAD_IN_WINDOW: ${{ steps.eval.outputs.boot_bad_in_window }}
          FAILURES_IN_WINDOW: ${{ steps.run.outputs.failure_count }}
          HOLD: "true"
        run: node scripts/canary-publish-hold.mjs

      - name: Fail job if threshold exceeded
        if: steps.eval.outputs.should_alert == 'true'
        run: |
          echo "Canary failure threshold exceeded: ${{ steps.eval.outputs.summary }}"
          exit 1
