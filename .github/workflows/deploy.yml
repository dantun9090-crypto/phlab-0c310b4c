name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_API }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_API }}
          command: pages deploy dist --project-name=phlabs

      - name: Purge Cloudflare edge cache
        if: success()
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_API }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -o /tmp/purge.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "HTTP $resp"
          cat /tmp/purge.json
          if [ "$resp" != "200" ]; then
            echo "::error::Cache purge failed"
            exit 1
          fi
          echo "✅ Edge cache purged"
