name: Pre-Release Cache Header Guard

# Blocks promotion to production if `/` or `/products` on the staging
# preview fails the cache-header contract (no-store on browser + CDN,
# cf-cache-status not in HIT/STALE/REVALIDATED/UPDATING, real HTML body,
# stable x-build-id). This is the last gate before Publish.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default: staging preview)"
        required: false
        default: "https://id-preview--1f12c255-a30a-4bea-bbab-28d9e6f70804.lovable.app"
  pull_request:
    branches: [main]
    paths:
      - "src/server.ts"
      - "src/routes/**"
      - "cloudflare/**"
      - "wrangler.jsonc"
      - "e2e/pre-release-cache-headers.spec.ts"

concurrency:
  group: pre-release-cache-headers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TEST_BASE_URL: ${{ github.event.inputs.base_url || 'https://id-preview--1f12c255-a30a-4bea-bbab-28d9e6f70804.lovable.app' }}
      PRE_RELEASE_CF_ATTEMPTS: "3"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Wait for staging preview to propagate
        run: sleep 45

      - name: Run pre-release cache-header spec
        run: |
          bunx playwright test e2e/pre-release-cache-headers.spec.ts \
            --project=chromium \
            --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pre-release
          path: playwright-report/
          retention-days: 7
