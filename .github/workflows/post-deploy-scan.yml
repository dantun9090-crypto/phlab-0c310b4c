name: Post-deploy security check

# Runs after a publish to main lands on phlabs.co.uk. Re-runs the
# dependency vulnerability scan against the exact lockfile that just
# shipped and uploads the SBOM + audit report into the deployment
# log so we have an immutable record of "what was live, with what
# known advisories, when".
#
# Does NOT block deploy (deploy already happened) — instead it
# surfaces regressions and opens an issue on any medium+ finding.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  post-deploy-scan:
    name: Post-deploy dependency audit + SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      issues: write
      # Required for cosign keyless signing (OIDC -> Fulcio -> Rekor).
      id-token: write
    steps:
      - uses: actions/checkout@v4


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps (frozen)
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bun run build
        env:
          BUILD_ID: ${{ github.sha }}

      - name: Generate SBOM
        run: bun run sbom
        env:
          BUILD_ID: ${{ github.sha }}

      # Cosign keyless signing of the deployed SBOM. The .sig + .pem
      # bind this exact SBOM (and therefore the dependency set that
      # just shipped to phlabs.co.uk) to this workflow's GitHub OIDC
      # identity, with a Rekor transparency-log entry as proof.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign SBOM (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/sbom.cdx.json.sig \
            --output-certificate dist/sbom.cdx.json.pem \
            dist/sbom.cdx.json

      - name: Verify SBOM signature (self-check)
        run: |
          cosign verify-blob \
            --certificate dist/sbom.cdx.json.pem \
            --signature dist/sbom.cdx.json.sig \
            --certificate-identity-regexp "^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/post-deploy-scan\.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/sbom.cdx.json | tee -a security-scan.log

      - name: Re-run dependency vulnerability scan
        id: scan
        run: |
          set +e
          bun run security:scan | tee -a security-scan.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Annotate deployment log
        if: always()
        run: |
          echo "## Post-deploy security report" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Domain: https://phlabs.co.uk" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scan exit: \`${{ steps.scan.outputs.exit_code }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SBOM signed: ✅ cosign keyless (Rekor logged)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 60 security-scan.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SBOM + signature + scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-${{ github.sha }}
          path: |
            dist/sbom.cdx.json
            dist/sbom.cdx.json.sha256
            dist/sbom.cdx.json.sig
            dist/sbom.cdx.json.pem
            security-scan.log
          retention-days: 180


      - name: Open issue if regression
        if: steps.scan.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Post-deploy security regression on ${sha}`,
              labels: ['security', 'dependencies', 'post-deploy'],
              body: [
                `A medium-or-higher vulnerability was detected in the dependencies of the build that just shipped to https://phlabs.co.uk.`,
                ``,
                `**Build:** \`${context.sha}\``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Fix by pinning the patched version via \`overrides\` + \`resolutions\` in \`package.json\`, then re-run \`bun run security:scan\` locally before merging.`,
              ].join('\n'),
            });
