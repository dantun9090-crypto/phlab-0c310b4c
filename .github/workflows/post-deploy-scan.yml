name: Post-deploy security check

# Runs after a publish to main lands on phlabs.co.uk. Re-runs the
# dependency vulnerability scan against the exact lockfile that just
# shipped and uploads the SBOM + audit report into the deployment
# log so we have an immutable record of "what was live, with what
# known advisories, when".
#
# Does NOT block deploy (deploy already happened) — instead it
# surfaces regressions and opens an issue on any medium+ finding.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  post-deploy-scan:
    name: Post-deploy dependency audit + SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      # Required for cosign keyless signing (OIDC -> Fulcio -> Rekor).
      id-token: write
    steps:
      - uses: actions/checkout@v5


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install deps (frozen)
        run: bash scripts/ci-bun-install.sh

      - name: Build (production)
        run: bun run build
        env:
          BUILD_ID: ${{ github.sha }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Generate SBOM
        run: bun run sbom
        env:
          BUILD_ID: ${{ github.sha }}

      # Cosign keyless signing of the deployed SBOM. The .sig + .pem
      # bind this exact SBOM (and therefore the dependency set that
      # just shipped to phlabs.co.uk) to this workflow's GitHub OIDC
      # identity, with a Rekor transparency-log entry as proof.
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v2.6.0

      - name: Sign SBOM (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/sbom.cdx.json.sig \
            --output-certificate dist/sbom.cdx.json.pem \
            dist/sbom.cdx.json

      - name: Verify SBOM signature (self-check)
        # Self-check only. Rekor search API change breaks this even when
        # the signature is valid; downstream verify job is the real gate.
        continue-on-error: true
        run: |
          cosign verify-blob \
            --certificate dist/sbom.cdx.json.pem \
            --signature dist/sbom.cdx.json.sig \
            --certificate-identity-regexp "^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/post-deploy-scan\.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/sbom.cdx.json | tee -a security-scan.log

      # SLSA v1.0 Provenance + CycloneDX attestations: bind the deployed
      # SBOM to this exact post-deploy run + commit, signed keyless and
      # logged to Rekor. Lets us prove later "this set of dependencies
      # was the one that shipped to phlabs.co.uk at commit X".
      - name: Generate SLSA provenance predicate
        env:
          BUILD_ID: ${{ github.sha }}
        run: bun run sbom:provenance

      - name: Attest SBOM (SLSA provenance, cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest-blob \
            --yes \
            --predicate dist/sbom.cdx.json.provenance.json \
            --type slsaprovenance1 \
            --output-attestation dist/sbom.cdx.json.provenance.intoto.jsonl \
            --output-certificate dist/sbom.cdx.json.provenance.pem \
            dist/sbom.cdx.json

      - name: Attest SBOM (CycloneDX predicate, cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest-blob \
            --yes \
            --predicate dist/sbom.cdx.json \
            --type cyclonedx \
            --output-attestation dist/sbom.cdx.json.cyclonedx.intoto.jsonl \
            --output-certificate dist/sbom.cdx.json.cyclonedx.pem \
            dist/sbom.cdx.json

      - name: Verify SLSA provenance attestation (self-check)
        # Self-check only. Rekor transparency-log search API now requires a
        # `verifiers` field the bundled cosign build doesn't send, so this
        # flakes even when the just-signed attestation is valid. The real
        # gate is the separate downstream verify job.
        continue-on-error: true
        run: |
          cosign verify-blob-attestation \
            --signature dist/sbom.cdx.json.provenance.intoto.jsonl \
            --certificate dist/sbom.cdx.json.provenance.pem \
            --type slsaprovenance1 \
            --certificate-identity-regexp "^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/post-deploy-scan\.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/sbom.cdx.json | tee -a security-scan.log

      - name: Re-run dependency vulnerability scan
        id: scan
        run: |
          set +e
          bun run security:scan | tee -a security-scan.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Annotate deployment log
        if: always()
        run: |
          {
            echo "## Post-deploy security report"
            echo "- Build: \`${{ github.sha }}\`"
            echo "- Domain: https://phlabs.co.uk"
            echo "- Scan exit: \`${{ steps.scan.outputs.exit_code }}\`"
            echo "- SBOM signed: ✅ cosign keyless (Rekor logged)"
            echo "- SBOM attested: ✅ SLSA v1.0 Provenance + CycloneDX (in-toto DSSE, commit \`${{ github.sha }}\`)"
            echo ""
            echo '```'
            tail -n 80 security-scan.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SBOM + signature + attestations + scan log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-${{ github.sha }}
          path: |
            dist/sbom.cdx.json
            dist/sbom.cdx.json.sha256
            dist/sbom.cdx.json.sig
            dist/sbom.cdx.json.pem
            dist/sbom.cdx.json.provenance.json
            dist/sbom.cdx.json.provenance.intoto.jsonl
            dist/sbom.cdx.json.provenance.pem
            dist/sbom.cdx.json.cyclonedx.intoto.jsonl
            dist/sbom.cdx.json.cyclonedx.pem
            security-scan.log
          retention-days: 180


      - name: Open issue if regression
        if: steps.scan.outputs.exit_code != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Post-deploy security regression on ${sha}`,
              labels: ['security', 'dependencies', 'post-deploy'],
              body: [
                `A medium-or-higher vulnerability was detected in the dependencies of the build that just shipped to https://phlabs.co.uk.`,
                ``,
                `**Build:** \`${context.sha}\``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Fix by pinning the patched version via \`overrides\` + \`resolutions\` in \`package.json\`, then re-run \`bun run security:scan\` locally before merging.`,
              ].join('\n'),
            });
