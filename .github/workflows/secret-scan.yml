name: Secret scan (gitleaks)

# Public repo → a single leaked secret is indexed by scraper bots within minutes.
# This workflow runs gitleaks against the FULL git history (not just the diff)
# on every push, every PR, and once a week as a safety net.
#
# ─────────────────────────────────────────────────────────────────────────────
#  Native GitHub layer (must ALSO be enabled — one-time repo setup):
#    Settings → Code security and analysis →
#      • "Secret scanning"       → Enable
#      • "Push protection"       → Enable  (blocks the push BEFORE the commit
#                                           lands on GitHub; strongest gate)
#      • "Secret scanning alerts for partners" → Enable
#      • "Validity checks"       → Enable
#  The Actions gate below is the second line of defence and covers custom
#  patterns / historical commits that GitHub's built-in scanner misses.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Monday 06:00 UTC — weekly full-history sweep as safety net.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks full-history scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # fetch-depth: 0 = full history. A secret committed 5 commits ago
          # must still be caught. Do NOT lower this.
          fetch-depth: 0

      - name: Run gitleaks
        # Pinned to v8.29.0 (release 2025-11-05). Do NOT use @master/@latest —
        # a compromised tag would run arbitrary code with repo read access.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # No GITLEAKS_LICENSE — public repos are free. Do not add one.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_ENABLE_COMMENTS: "true"
