name: cache-recovery-monitor

# Watches https://phlabs.co.uk/api/public/cache-recovery-stats and pings
# Slack when the rolling 1h window shows:
#   - any "cache reset needed" screen fires, OR
#   - recovery-triggered count crosses a threshold, OR
#   - any recovery fires on the sensitive commerce routes
#     (/cart /checkout /payment /register /vip).
#
# Runs every 30 minutes.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Lookback window in hours (default 1)"
        required: false
        default: "1"

concurrency:
  group: cache-recovery-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Poll cache-recovery-stats
        id: poll
        env:
          HOURS: ${{ github.event.inputs.hours || '1' }}
          RECOVERY_THRESHOLD: "10"
          CACHE_RESET_THRESHOLD: "1"
          CRITICAL_ROUTE_THRESHOLD: "1"
        run: |
          set -euo pipefail
          URL="https://phlabs.co.uk/api/public/cache-recovery-stats?hours=${HOURS}"
          echo "Polling $URL"
          RESP=$(curl -fsS --max-time 20 "$URL" || echo '{"ok":false}')
          echo "$RESP" | tee stats.json | head -c 4000
          echo

          TRIG=$(jq -r '.totals.recoveryTriggered // 0' stats.json)
          SHOWN=$(jq -r '.totals.cacheResetShown // 0' stats.json)
          FAIL=$(jq -r '.totals.recoveryFailed // 0' stats.json)
          CRIT=$(jq -r '[.criticalRouteRecoveries // {} | to_entries[] | .value] | add // 0' stats.json)

          ALERT_REASONS=""
          if [ "$SHOWN" -ge "$CACHE_RESET_THRESHOLD" ]; then
            ALERT_REASONS="${ALERT_REASONS}cache_reset_shown=${SHOWN} "
          fi
          if [ "$TRIG" -ge "$RECOVERY_THRESHOLD" ]; then
            ALERT_REASONS="${ALERT_REASONS}recovery_triggered=${TRIG} "
          fi
          if [ "$CRIT" -ge "$CRITICAL_ROUTE_THRESHOLD" ]; then
            ALERT_REASONS="${ALERT_REASONS}critical_route_recovery=${CRIT} "
          fi

          {
            echo "should_alert=$([ -n \"$ALERT_REASONS\" ] && echo true || echo false)"
            echo "reasons=$ALERT_REASONS"
            echo "triggered=$TRIG"
            echo "shown=$SHOWN"
            echo "failed=$FAIL"
            echo "critical=$CRIT"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.poll.outputs.should_alert == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=":rotating_light: phlabs.co.uk cache-recovery alert — ${{ steps.poll.outputs.reasons }}(triggered=${{ steps.poll.outputs.triggered }}, shown=${{ steps.poll.outputs.shown }}, failed=${{ steps.poll.outputs.failed }}, critical-routes=${{ steps.poll.outputs.critical }}) — run ${{ github.run_id }}"
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MSG\"}" "$SLACK_WEBHOOK_URL" || true

      - name: Notify Telegram
        if: steps.poll.outputs.should_alert == 'true' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚨 phlabs.co.uk cache-recovery alert — ${{ steps.poll.outputs.reasons }}(triggered=${{ steps.poll.outputs.triggered }}, shown=${{ steps.poll.outputs.shown }}, critical-routes=${{ steps.poll.outputs.critical }})"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" --data-urlencode "text=${MSG}" || true

      - name: Fail job on alert
        if: steps.poll.outputs.should_alert == 'true'
        run: |
          echo "Cache-recovery threshold exceeded: ${{ steps.poll.outputs.reasons }}"
          exit 1
