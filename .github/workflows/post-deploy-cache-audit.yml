name: Post-Deploy Cache Header Audit

# Runs after every successful production deploy (Cloudflare Worker) and after
# the post-deploy edge purge, to verify that `/` and `/products` are served
# with `no-store` (never cached at the edge or browser).
#
# Report is written to the workflow Summary tab for readable CI output, and
# the job fails hard if the contract is broken so regressions are caught
# immediately after a deploy.

on:
  workflow_run:
    workflows:
      - "Deploy Cloudflare Worker"
      - "Post-Deploy Edge Purge"
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to audit (default: https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"
      routes:
        description: "Optional override: newline- or comma-separated paths (e.g. `/`, `/products`, `/products/tirzepatide-research-peptide`). Overrides .github/cache-audit.routes.json for this run."
        required: false
        default: ""
      routes_file:
        description: "Path to routes config JSON (default: .github/cache-audit.routes.json)"
        required: false
        default: ".github/cache-audit.routes.json"

concurrency:
  group: post-deploy-cache-audit
  cancel-in-progress: false

jobs:
  audit:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Wait for edge propagation (30s)
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 30

      # Pull the JSON from the most recent successful run of THIS workflow so
      # we can diff header state across deploys. Missing artifact is fine —
      # the diff step treats it as "baseline established this run".
      - name: Download previous audit report
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: cache-audit-report
          workflow: post-deploy-cache-audit.yml
          workflow_conclusion: success
          branch: main
          path: ./previous
          if_no_artifact_found: warn

      # Pull recent successful audit artifacts so we can render a multi-deploy
      # trend (table + Mermaid chart) in the Summary tab. Failure is non-fatal.
      - name: Download audit history (last 10 runs)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: cache-audit-report
          workflow: post-deploy-cache-audit.yml
          workflow_conclusion: success
          branch: main
          path: ./history
          if_no_artifact_found: warn

      - name: Audit cache headers
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
          AUDIT_JSON_OUT: audit-cache-headers.json
          AUDIT_ROUTES: ${{ github.event.inputs.routes }}
          AUDIT_ROUTES_FILE: ${{ github.event.inputs.routes_file || '.github/cache-audit.routes.json' }}
          VIOLATIONS_DIR: cache-audit-violations
        run: |
          chmod +x .github/workflows/scripts/audit-cache-headers.sh
          .github/workflows/scripts/audit-cache-headers.sh || audit_rc=$?
          echo "AUDIT_RC=${audit_rc:-0}" >> "$GITHUB_ENV"

      - name: Diff against previous deploy
        if: always()
        run: |
          prev="./previous/audit-cache-headers.json"
          [ -f "$prev" ] || prev="/dev/null"
          python3 .github/workflows/scripts/diff-cache-audit.py "$prev" audit-cache-headers.json || diff_rc=$?
          echo "DIFF_RC=${diff_rc:-0}" >> "$GITHUB_ENV"

      - name: Render multi-deploy trend report (table + chart)
        if: always()
        continue-on-error: true
        run: |
          python3 .github/workflows/scripts/render-cache-trend.py \
            audit-cache-headers.json ./history

      - name: Upload current audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-audit-report
          path: audit-cache-headers.json
          retention-days: 90

      # Uploaded only when the audit found at least one violation, so
      # investigators get the raw HTTP response context (cf-ray, cf-request-id,
      # full headers, first 4 KiB of body) without re-running the audit.
      - name: Upload violation dumps
        if: always() && env.AUDIT_RC != '0'
        uses: actions/upload-artifact@v4
        with:
          name: cache-audit-violations
          path: cache-audit-violations/
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail job on audit violation
        if: env.AUDIT_RC != '0' && env.AUDIT_RC != ''
        run: |
          echo "::error::Cache-header audit reported violations — see 'cache-audit-violations' artifact."
          exit 1

      - name: Fail job on diff regression
        if: env.DIFF_RC == '1'
        run: |
          echo "::error::Cache-header regression detected vs previous deploy (see Summary tab)."
          exit 1

