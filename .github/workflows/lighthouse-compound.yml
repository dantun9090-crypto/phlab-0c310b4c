# Lighthouse CI for /compound — runs BOTH desktop and mobile (slow-4G CPU 4x)
# audits. Either profile failing its thresholds fails the build.
#
# Thresholds:
#   Desktop  — Performance ≥ 0.85, SEO ≥ 0.95
#   Mobile   — Performance ≥ 0.75, SEO ≥ 0.95   (real-user slow-4G + CPU 4x)
name: Lighthouse — /compound

on:
  push:
    branches: [main]
    paths:
      - "src/routes/compound.tsx"
      - "public/og/compound.jpg"
      - ".lighthouserc*.json"
      - ".github/workflows/lighthouse-compound.yml"
  pull_request:
    paths:
      - "src/routes/compound.tsx"
      - "public/og/compound.jpg"
      - ".lighthouserc*.json"
      - ".github/workflows/lighthouse-compound.yml"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        profile: [desktop, mobile]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (${{ matrix.profile }})
        run: lhci autorun --config=.lighthouserc.${{ matrix.profile }}.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
