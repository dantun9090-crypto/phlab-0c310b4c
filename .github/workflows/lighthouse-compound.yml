# Lighthouse CI for /compound landing page.
# Fails the build if Performance < 0.85 or SEO < 0.95.
# Thresholds live in .lighthouserc.json.
name: Lighthouse — /compound

on:
  push:
    branches: [main]
    paths:
      - "src/routes/compound.tsx"
      - "public/og/compound.jpg"
      - ".lighthouserc.json"
      - ".github/workflows/lighthouse-compound.yml"
  pull_request:
    paths:
      - "src/routes/compound.tsx"
      - "public/og/compound.jpg"
      - ".lighthouserc.json"
      - ".github/workflows/lighthouse-compound.yml"
  schedule:
    # Daily regression check against the live origin.
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse audit (perf + SEO thresholds)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI against live /compound
        run: lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
