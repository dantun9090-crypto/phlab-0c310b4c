name: Post-deploy health check

# Verifies that after every publish (Release or Deploy Cloudflare Worker),
# the live edge is serving:
#   1. GET /__health              → 200 + JSON `"status":"ok"` + non-empty buildId
#   2. GET /                      → response carries `cf-cache-build-id` header
#      (proves the phlabs-prerender Worker is on-path and its build tag
#       reached the browser through CF's cache)
#
# Fails the job — and opens a GitHub issue — the moment either check breaks,
# so a bad deploy or a Worker route unbinding is caught in minutes instead
# of hours.

on:
  workflow_run:
    workflows: ["Release", "Deploy Cloudflare Worker"]
    types: [completed]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  health:
    name: /__health + cf-cache-build-id
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
    steps:
      - name: Wait for edge propagation
        if: github.event_name == 'workflow_run'
        run: sleep 60

      - name: Probe /__health
        id: health
        run: |
          set -euo pipefail
          echo "GET $BASE_URL/__health"
          body=$(curl -sS -f --max-time 20 "$BASE_URL/__health")
          echo "$body"
          echo "$body" | grep -q '"status":"ok"' \
            || { echo "::error::/__health missing \"status\":\"ok\""; exit 1; }
          # buildId must be present and non-empty
          echo "$body" | grep -Eq '"buildId":"[^"]+"' \
            || { echo "::error::/__health missing non-empty buildId"; exit 1; }
          echo "health=ok" >> "$GITHUB_OUTPUT"

      - name: Probe cf-cache-build-id on /
        id: header
        run: |
          set -euo pipefail
          echo "HEAD $BASE_URL/"
          headers=$(curl -sSI --max-time 20 "$BASE_URL/")
          echo "$headers"
          CF_BID=$(echo "$headers" | awk 'tolower($1)=="cf-cache-build-id:"{print $2}' | tr -d '\r')
          echo "cf-cache-build-id: '$CF_BID'"
          if [ -z "$CF_BID" ]; then
            echo "::error::cf-cache-build-id header missing on $BASE_URL/ — Worker may be unbound or stale"
            exit 1
          fi
          echo "cf_build_id=$CF_BID" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: failure() && github.event_name != 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Post-deploy health check failed on ${sha}`,
              labels: ['regression', 'post-deploy', 'critical'],
              body: [
                `Post-deploy health check failed against \`${process.env.BASE_URL}\`.`,
                ``,
                `Failing check(s):`,
                `- GET /__health → expected 200 JSON with \`"status":"ok"\` and non-empty \`buildId\``,
                `- GET / → expected \`cf-cache-build-id\` response header (phlabs-prerender Worker)`,
                ``,
                `Fix path:`,
                `1. Re-run **Deploy Cloudflare Worker** (workflow_dispatch).`,
                `2. Purge Cloudflare cache (\`purge_everything\` on zone \`ed093ef4578e8e3568e26c3e979558c6\`).`,
                `3. Confirm the \`phlabs-prerender\` Worker route \`phlabs.co.uk/*\` is still bound.`,
                ``,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
