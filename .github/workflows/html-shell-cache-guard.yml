name: HTML shell no-cache guard

# CI guardrail: public HTML shells must remain no-store at browser/CDN/proxy
# tiers. Static assets carry long immutable caching; HTML carries hashed asset
# pointers and must never be replayed from edge cache after a publish.
#
# Enforcement rules (see scripts/cache-headers-scan.ts):
#   - html-shell + sensitive paths: cache-control / cdn-cache-control /
#     surrogate-control must be uncacheable, s-maxage=0, cf-cache-status MUST
#     NOT be HIT / REVALIDATED / STALE / UPDATING.


on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"
  workflow_run:
    workflows: ["Release", "Post-deploy security check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"

jobs:
  html-shell-guard:
    name: HTML shell must not be edge-cached
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      # Give Cloudflare/origin a moment after a fresh deploy so we're
      # probing the newly published shell, not the one still propagating.
      - name: Wait for edge propagation
        if: github.event_name == 'push' || github.event_name == 'workflow_run'
        run: sleep 90

      - name: Probe HTML shell cache headers
        id: scan
        env:
          CACHE_SCAN_BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
          CACHE_SCAN_OUT_DIR: cache-headers-report
        run: |
          set +e
          bun run scripts/cache-headers-scan.ts
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: html-shell-cache-report-${{ github.sha }}
          path: cache-headers-report/
          retention-days: 30

      - name: Open issue on regression
        if: steps.scan.outputs.exit_code != '0' && github.event_name != 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `HTML shell cache regression on ${sha}`,
              labels: ['regression', 'cache', 'post-deploy', 'critical'],
              body: [
                `An HTML shell cache-policy check failed on the live site.`,
                ``,
                `Either a public HTML shell lost its no-store headers, or a`,
                `sensitive path started being edge-cached.`,
                ``,
                `Fix path:`,
                `1. If a public shell shows HIT/STALE/REVALIDATED: purge the`,
                `   Cloudflare edge immediately and remove the cache rule match.`,
                `2. If a sensitive path shows HIT: purge the Cloudflare edge`,
                `   immediately and check for a cache rule accidentally`,
                `   matching /admin, /cart, /checkout, /account, /login,`,
                `   /register, /payment, /vip, or /api/*.`,
                `3. Confirm src/server.ts still emits \`cache-control: no-store\``,
                `   plus \`cdn-cache-control: no-store\` on HTML shells.`,
                ``,
                `Download the \`html-shell-cache-report-${context.sha}\` artifact for the full report.`,
                ``,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });

      - name: Fail on regression
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1

