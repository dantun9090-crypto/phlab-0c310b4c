name: HTML shell cache guard

# CI guardrail (post-policy-flip 2026-07): Cloudflare Cache Rule 3
# intentionally caches public HTML shells at the edge for 4h. This job
# probes the critical shell routes against the live edge after every
# push to main and on a 15-min schedule, failing loudly if:
#   - a public HTML shell stops being edge-cached (cf-cache-status !=
#     HIT/REVALIDATED/UPDATING/STALE on the warm probe), OR
#   - a sensitive path (/admin, /cart, /checkout, /account, /login,
#     /register, /payment, /vip, /api/*) starts being edge-cached.
#
# Enforcement rules (see scripts/cache-headers-scan.ts):
#   - html-shell paths: cf-cache-status MUST be HIT / REVALIDATED /
#     UPDATING / STALE on the second (warm) probe. DYNAMIC or MISS fails.
#   - sensitive paths: cache-control / cdn-cache-control / surrogate-
#     control must all be uncacheable, s-maxage=0, cf-cache-status MUST
#     NOT be HIT / REVALIDATED / STALE / UPDATING.


on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"
  workflow_run:
    workflows: ["Release", "Post-deploy security check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default https://phlabs.co.uk)"
        required: false
        default: "https://phlabs.co.uk"

jobs:
  html-shell-guard:
    name: HTML shell must not be edge-cached
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Give Cloudflare/origin a moment after a fresh deploy so we're
      # probing the newly published shell, not the one still propagating.
      - name: Wait for edge propagation
        if: github.event_name == 'push' || github.event_name == 'workflow_run'
        run: sleep 90

      - name: Probe HTML shell cache headers
        id: scan
        env:
          CACHE_SCAN_BASE_URL: ${{ github.event.inputs.base_url || 'https://phlabs.co.uk' }}
          CACHE_SCAN_OUT_DIR: cache-headers-report
        run: |
          set +e
          bun run scripts/cache-headers-scan.ts
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: html-shell-cache-report-${{ github.sha }}
          path: cache-headers-report/
          retention-days: 30

      - name: Open issue on regression
        if: steps.scan.outputs.exit_code != '0' && github.event_name != 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `HTML shell cache regression on ${sha}`,
              labels: ['regression', 'cache', 'post-deploy', 'critical'],
              body: [
                `An HTML shell cache-policy check failed on the live site.`,
                ``,
                `Either a public HTML shell stopped being edge-cached (Cache`,
                `Rule 3 not matching → cf-cache-status DYNAMIC/MISS on warm`,
                `probe), or a sensitive path started being edge-cached.`,
                ``,
                `Fix path:`,
                `1. If a public shell shows DYNAMIC: verify the phlabs-prerender`,
                `   Worker is passing non-bot traffic through unchanged, and`,
                `   that Cache Rule 3 (edge TTL 14400s) still matches the path.`,
                `2. If a sensitive path shows HIT: purge the Cloudflare edge`,
                `   immediately and check for a cache rule accidentally`,
                `   matching /admin, /cart, /checkout, /account, /login,`,
                `   /register, /payment, /vip, or /api/*.`,
                `3. Confirm src/server.ts still emits \`cache-control: no-store\``,
                `   on HTML shells (origin invariant; CF Rule 3 overrides at edge).`,
                ``,
                `Download the \`html-shell-cache-report-${context.sha}\` artifact for the full report.`,
                ``,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });

      - name: Fail on regression
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1

