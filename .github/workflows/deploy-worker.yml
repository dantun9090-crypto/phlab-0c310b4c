name: Deploy Cloudflare Worker

on:
  # Fire on ANY push to main. The path-filtered trigger was unreliable because
  # Lovable's auto-commit sometimes batches worker changes with other files in
  # ways that don't match the `paths:` filter, so the worker never redeployed.
  # `wrangler deploy` on an unchanged script is a cheap no-op (~15s), so
  # over-firing is safe. Concurrency below dedupes back-to-back pushes.
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [lovable-publish, deploy-worker]

concurrency:
  group: deploy-cloudflare-worker
  cancel-in-progress: false


permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Prerender Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Snapshot the currently-live Worker script BEFORE deploying so we can
      # re-upload it verbatim if smoke tests fail. Uses the CF API directly
      # (wrangler has no "download current script" command). Failure here is
      # non-fatal — worst case rollback is unavailable this run.
      - name: Snapshot current Worker (for rollback)
        id: snapshot
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_API }}
        run: |
          mkdir -p /tmp/rollback
          # IMPORTANT: use /content endpoint. The bare
          # /workers/scripts/{name} endpoint returns multipart/form-data for
          # module workers, which cannot be re-uploaded verbatim as the main
          # module (CF rejects it with a 400 metadata error — the cause of
          # the previous rollback failures). /content returns the raw ESM.
          HTTP=$(curl -sS -o /tmp/rollback/phlabs-prerender.mjs -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/phlabs-prerender/content" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Accept: application/javascript+module")
          echo "snapshot HTTP $HTTP"
          BYTES=$(wc -c < /tmp/rollback/phlabs-prerender.mjs 2>/dev/null || echo 0)
          FIRST=$(head -c 80 /tmp/rollback/phlabs-prerender.mjs | tr -d '\n' || true)
          echo "snapshot bytes=$BYTES firstBytes='$FIRST'"
          # Sanity: must start like real ESM (import/export/comment) and be >5KB.
          if [ "$HTTP" = "200" ] && [ "$BYTES" -gt 5000 ] \
             && head -c 200 /tmp/rollback/phlabs-prerender.mjs | grep -qE '^(import |export |//|/\*|"use )'; then
            echo "have_snapshot=true" >> "$GITHUB_OUTPUT"
            echo "Snapshot saved ($BYTES bytes)"
          else
            echo "have_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "WARN: no valid snapshot available — rollback will be skipped if smoke tests fail"
            echo "--- snapshot head ---"
            head -c 500 /tmp/rollback/phlabs-prerender.mjs || true
            echo
            echo "--- end ---"
          fi

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_API }}
        working-directory: cloudflare
        # Deploy by name — preserves existing route bindings configured in the CF dashboard
        # (phlabs.co.uk/* on the phlabs zone; legacy domain proxies stay on the `phlab` worker).
        run: npx --yes wrangler@4 deploy phlabs-prerender.mjs --name phlabs-prerender --compatibility-date 2025-09-24 --compatibility-flags nodejs_compat


      - name: Purge Cloudflare Cache (phlabs.co.uk — scoped HTML + feeds)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: |
          set -euo pipefail
          # NEVER purge_everything — hashed /assets/* are immutable and must
          # survive every deploy; wiping them 404s open sessions.
          # See .lovable/memory/post-publish-edge-purge.md.
          resp=$(curl -sS -o /tmp/purge-phlabs.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://phlabs.co.uk/","https://phlabs.co.uk/products","https://phlabs.co.uk/sitemap.xml","https://phlabs.co.uk/robots.txt","https://phlabs.co.uk/llms.txt","https://phlabs.co.uk/google-merchant-feed.xml","https://phlabs.co.uk/google-merchant-feed-free.xml","https://phlabs.co.uk/feed.xml"]}')
          echo "HTTP $resp"
          cat /tmp/purge-phlabs.json
          [ "$resp" = "200" ] || { echo "::error::Cache purge failed"; exit 1; }
          echo "Cache purged (scoped) for phlabs.co.uk"

      # check-domains-allow-next-line
      - name: Purge Cloudflare Cache (legacy prohealth zone — scoped)
        if: ${{ env.CF_ZONE_ID != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PROHEALTH }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -o /tmp/purge-legacy.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://prohealthpeptides.co.uk/","https://prohealthpeptides.co.uk/sitemap.xml","https://prohealthpeptides.co.uk/robots.txt","https://prohealthpeptides.co.uk/google-merchant-feed-free.xml"]}')  # check-domains-allow-line: legacy proxy zone purge target
          echo "HTTP $resp"
          cat /tmp/purge-legacy.json
          [ "$resp" = "200" ] || { echo "::error::Legacy zone purge failed"; exit 1; }
          echo "Cache purged (scoped) for legacy zone"

      - name: Wait for edge propagation
        run: sleep 10

      # Force Prerender.io to rebuild snapshots for the top URLs BEFORE the
      # edge warm-up runs. Otherwise every deploy parks in "fallback=origin"
      # until prerender's cache naturally expires (~hours). Order must be:
      # deploy -> assets live -> prerender recache -> warm edge -> smoke.
      - name: Prerender.io recache (top URLs)
        env:
          PRERENDER_TOKEN: ${{ secrets.PRERENDER_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${PRERENDER_TOKEN:-}" ]; then
            echo "::warning::PRERENDER_TOKEN missing — skipping recache"
            exit 0
          fi
          # Recache the PUBLIC phlabs.co.uk URLs. Prerender.io's renderer is
          # detected at the top of the worker's bot branch (UA /prerender/i
          # or any X-Prerender-* header) and passed through to real origin,
          # breaking the self-staling loop without needing a separate origin
          # host (phlabs-prod.web.app does not exist — verified 404).
          URLS=(
            "https://phlabs.co.uk/"
            "https://phlabs.co.uk/products"
            "https://phlabs.co.uk/products/retatrutide"
            "https://phlabs.co.uk/products/bpc-157"
            "https://phlabs.co.uk/products/tirzepatide"
            "https://phlabs.co.uk/quality-control"
          )

          # Single-mode adaptive recache (2026-07-18, updated): Prerender.io
          # "Mobile Optimized Rendering" is DISABLED in the dashboard, so
          # only desktop renders are produced. Posting mobile is wasted.
          for u in "${URLS[@]}"; do
            code=$(curl -sS -o /tmp/pr.out -w "%{http_code}" \
              -X POST https://api.prerender.io/recache \
              -H "Content-Type: application/json" \
              -d "{\"prerenderToken\":\"$PRERENDER_TOKEN\",\"url\":\"$u\",\"adaptiveType\":\"desktop\"}")
            echo "recache $u [desktop] -> HTTP $code"
            [ "$code" = "200" ] || { echo "::warning::prerender recache non-200 for $u"; cat /tmp/pr.out; echo; }
          done

          # Give prerender ~45s to actually rebuild both buckets before the
          # edge warm-up asks for those URLs (otherwise the warm-up caches
          # the stale copy).
          sleep 45

      - name: Warm edge cache (post-deploy)
        env:
          # Exported so warm-edge.sh can purge HTML cache on sanity failure.
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: bash scripts/warm-edge.sh

      # ── Post-deploy Playwright smoke test through the worker-fronted URL.
      # Runs a real Chromium against https://phlabs.co.uk to catch failures
      # the header-only checks miss (age-gate broken, cookie banner stuck,
      # /products blank, Add-to-cart no-op). Any failure => detach worker
      # routes via CF API in the next step so no visitor hits a broken worker.
      # Re-attach worker routes if a prior failed run auto-detached them.
      # Without this, the smoke test hits origin directly and proves nothing.
      - name: Ensure worker routes attached
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: |
          set -uo pipefail
          resp=$(curl -sS "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/workers/routes" \
            -H "Authorization: Bearer $CF_API_TOKEN")
          have_apex=$(echo "$resp" | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log((r.result||[]).some(x=>x.script==='phlabs-prerender'&&x.pattern==='phlabs.co.uk/*'))")
          have_www=$(echo "$resp"  | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log((r.result||[]).some(x=>x.script==='phlabs-prerender'&&x.pattern==='www.phlabs.co.uk/*'))")
          echo "routes present: apex=$have_apex www=$have_www"
          for pat in "phlabs.co.uk/*" "www.phlabs.co.uk/*"; do
            has=$(echo "$resp" | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log((r.result||[]).some(x=>x.script==='phlabs-prerender'&&x.pattern==='$pat'))")
            if [ "$has" != "true" ]; then
              echo "::warning::Route $pat not attached — creating"
              curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/workers/routes" \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"pattern\":\"$pat\",\"script\":\"phlabs-prerender\"}" | head -c 500
              echo
            fi
          done

      - name: Worker-fronted UI smoke (Playwright)
        id: uismoke
        env:
          # Match the project's @playwright/test version so playwright-core
          # and the downloaded chromium archive stay in lock-step. Drift
          # between the two is what produced the previous
          # "Executable doesn't exist /.../chromium-1134/..." failure.
          PLAYWRIGHT_VERSION: 1.61.0
        run: |
          set -uo pipefail
          mkdir -p smoke-diag
          npm i --no-save --silent \
            "playwright@${PLAYWRIGHT_VERSION}" \
            "@playwright/test@${PLAYWRIGHT_VERSION}" > smoke-diag/npm.log 2>&1
          echo "npm rc=$?" > smoke-diag/install.rc
          npx --yes "playwright@${PLAYWRIGHT_VERSION}" install --with-deps chromium > smoke-diag/browser-install.log 2>&1
          echo "browser-install rc=$?" >> smoke-diag/install.rc
          ls -la ~/.cache/ms-playwright/ > smoke-diag/browser-cache.txt 2>&1 || true

          # Retry up to 3 attempts, 15s apart. Deploy-window transients
          # (0-byte-200 race, brief 5xx during asset swap) resolve within
          # ~30s; a real regression fails all 3. Only the 3rd failure
          # counts, which is what gates the route-detach step below.
          attempt=1
          max=3
          delay=15
          while : ; do
            echo "=== UI smoke attempt ${attempt}/${max} ==="
            # Output captured ungrouped: grouped sections collapse in the
            # raw-logs API, which hid the actual smoke failure twice.
            if node scripts/worker-smoke-playwright.mjs > smoke-diag/attempt-${attempt}.log 2>&1; then
              echo "✅ UI smoke passed on attempt ${attempt}"
              exit 0
            fi
            rc=$?
            echo "::warning::UI smoke attempt ${attempt}/${max} failed (exit ${rc})"
            if [ "${attempt}" -ge "${max}" ]; then
              echo "::error::UI smoke failed all ${max} attempts — treating as real failure"
              exit 1
            fi
            attempt=$((attempt+1))
            echo "sleeping ${delay}s before retry..."
            sleep "${delay}"
          done

      # Smoke diagnostics are the only reliable channel (step stdout is
      # lost by the runner log collector on this workflow).
      - name: Upload smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-diag-${{ github.run_id }}-${{ github.run_attempt }}
          path: smoke-diag/
          if-no-files-found: ignore
          retention-days: 14


      # ── Emergency route detach if the UI smoke test failed.
      # Queries the phlabs zone for any worker route bound to the
      # phlabs-prerender script and deletes each. Origin then serves
      # traffic directly (bypassing the worker) until we push a fix.
      - name: Detach worker routes on smoke failure
        if: failure() && steps.uismoke.conclusion == 'failure'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: |
          set -uo pipefail
          echo "::warning::UI smoke failed — detaching phlabs-prerender routes"
          resp=$(curl -sS "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/workers/routes" \
            -H "Authorization: Bearer $CF_API_TOKEN")
          echo "$resp" | head -c 2000
          echo
          ids=$(node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8'));(r.result||[]).filter(x=>x.script==='phlabs-prerender').forEach(x=>console.log(x.id))" <<<"$resp")
          if [ -z "$ids" ]; then
            echo "::warning::no phlabs-prerender routes found to detach"
          else
            for id in $ids; do
              echo "DELETE route $id"
              curl -sS -X DELETE \
                "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/workers/routes/$id" \
                -H "Authorization: Bearer $CF_API_TOKEN" | head -c 500
              echo
            done
            echo "::notice::phlabs-prerender routes detached — traffic bypasses worker"
          fi
          exit 1




      - name: Smoke test /__health (phlabs.co.uk)
        run: |
          echo "GET https://phlabs.co.uk/__health"
          body=$(curl -sS -f https://phlabs.co.uk/__health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"' || { echo "health payload missing status ok"; exit 1; }

      - name: Smoke test /__health (legacy domain)
        run: |
          LEGACY_HOST="prohealthpeptides.co.uk" # check-domains-allow-line
          echo "GET https://$LEGACY_HOST/__health"
          curl -sS -f -o /dev/null -w "HTTP %{http_code}\n" "https://$LEGACY_HOST/__health" || echo "legacy /__health not served by prerender worker (expected — legacy zone 301s to apex)"

      - name: Verify x-build-id header
        run: |
          BUILD_ID=$(curl -sSI https://phlabs.co.uk/ | awk 'tolower($1)=="x-build-id:"{print $2}' | tr -d '\r')
          echo "Current build ID: '$BUILD_ID'"
          if [ -z "$BUILD_ID" ]; then
            echo "ERROR: x-build-id header missing on https://phlabs.co.uk/"
            exit 1
          fi
          echo "Build ID verified: $BUILD_ID"

      - name: Verify CF-Cache-Build-ID header (worker-injected)
        run: |
          CF_BID=$(curl -sSI https://phlabs.co.uk/ | awk 'tolower($1)=="cf-cache-build-id:"{print $2}' | tr -d '\r')
          echo "CF-Cache-Build-ID: '$CF_BID'"
          if [ -z "$CF_BID" ]; then
            echo "WARN: CF-Cache-Build-ID missing — new worker may not have been deployed. Check wrangler output above."
            exit 1
          fi

      # ── Automatic rollback ────────────────────────────────────────────
      # If any step above failed (deploy itself, /__health, x-build-id,
      # or cf-cache-build-id), re-upload the snapshot taken before deploy
      # so the edge returns to the last known-good Worker within seconds.
      - name: Rollback Worker on failure
        if: failure() && steps.snapshot.outputs.have_snapshot == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_API }}
        run: |
          set -uo pipefail
          echo "::warning::Smoke tests failed — rolling back phlabs-prerender to previous version"
          echo "--- snapshot file check ---"
          ls -la /tmp/rollback/ || true
          BYTES=$(wc -c < /tmp/rollback/phlabs-prerender.mjs 2>/dev/null || echo 0)
          echo "snapshot bytes=$BYTES"
          echo "snapshot head (first 200 chars):"
          head -c 200 /tmp/rollback/phlabs-prerender.mjs || true
          echo
          echo "--- uploading rollback ---"
          METADATA='{"main_module":"phlabs-prerender.mjs","compatibility_date":"2025-09-24","compatibility_flags":["nodejs_compat"]}'
          HTTP=$(curl -sS -o /tmp/rollback-response.json -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/phlabs-prerender" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -F "metadata=$METADATA;type=application/json" \
            -F "phlabs-prerender.mjs=@/tmp/rollback/phlabs-prerender.mjs;type=application/javascript+module")
          echo "rollback HTTP $HTTP"
          echo "--- CF API response body ---"
          cat /tmp/rollback-response.json || true
          echo
          echo "--- end response body ---"
          if [ "$HTTP" != "200" ]; then
            echo "::error::rollback upload failed with HTTP $HTTP — inspect the CF API response body above"
            exit 1
          fi

      - name: Purge cache after rollback (scoped)
        if: failure() && steps.snapshot.outputs.have_snapshot == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -o /tmp/purge-rollback.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://phlabs.co.uk/","https://phlabs.co.uk/products","https://phlabs.co.uk/sitemap.xml","https://phlabs.co.uk/robots.txt","https://phlabs.co.uk/llms.txt","https://phlabs.co.uk/google-merchant-feed.xml","https://phlabs.co.uk/google-merchant-feed-free.xml","https://phlabs.co.uk/feed.xml"]}')
          echo "HTTP $resp"
          cat /tmp/purge-rollback.json
          [ "$resp" = "200" ] || { echo "::error::Rollback purge failed"; exit 1; }
          echo "Edge cache purged (scoped) after rollback"

      - name: Warm edge cache (post-rollback)
        if: failure() && steps.snapshot.outputs.have_snapshot == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_PHLABS }}
        run: bash scripts/warm-edge.sh



      - name: Verify rollback restored /__health
        if: failure() && steps.snapshot.outputs.have_snapshot == 'true'
        run: |
          sleep 10
          echo "GET https://phlabs.co.uk/__health (post-rollback)"
          body=$(curl -sS -f --max-time 20 https://phlabs.co.uk/__health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"' \
            || { echo "::error::rollback did NOT restore /__health — manual intervention required"; exit 1; }
          echo "::notice::Rollback successful — previous Worker version restored"
