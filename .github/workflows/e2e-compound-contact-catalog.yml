name: E2E — /compound + /contact + /request-catalog regression

# Re-validates the three CI-critical flows after any change to:
#   * /compound CTAs / analytics tracking
#   * /contact qualification gating
#   * /request-catalog email payload + receipt handling
#
# Runs on PRs that touch the affected files, nightly, and on demand.

on:
  pull_request:
    paths:
      - "src/components/PremiumLanding.tsx"
      - "src/routes/_marketing.compound.tsx"
      - "src/pages/Contact/index.tsx"
      - "src/routes/contact.tsx"
      - "src/pages/RequestCatalog/index.tsx"
      - "src/routes/request-catalog.tsx"
      - "src/lib/analytics.ts"
      - "src/lib/sendPublicMail.ts"
      - "src/routes/api/public/send-mail.ts"
      - "e2e/compound-contact-catalog-regression.spec.ts"
      - ".github/workflows/e2e-compound-contact-catalog.yml"
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-compound-contact-catalog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright (Node + Chromium)
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Start preview server
        run: |
          (bun run start &) > server.log 2>&1
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null "http://localhost:8080/"; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start"; tail -n 200 server.log; exit 1

      - name: Run regression spec
        run: bunx playwright test e2e/compound-contact-catalog-regression.spec.ts --reporter=list,junit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit.xml

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore
