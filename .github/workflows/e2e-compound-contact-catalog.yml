name: E2E — /compound + /contact + /request-catalog regression

# Re-validates the three CI-critical flows after any change to:
#   * /compound CTAs / analytics tracking
#   * /contact qualification gating
#   * /request-catalog email payload + receipt handling
#   * /PH-Labs-Research-Catalogue.pdf shipped asset
#
# Runs on PRs that touch the affected files, nightly, and on demand.
# Matrix runs the functional suite on BOTH Chromium and Firefox to ensure
# qualification gating + disabled-button behaviour is consistent.
# Visual snapshots are chromium-only (font hinting differs in Firefox).

on:
  pull_request:
    paths:
      - "src/components/PremiumLanding.tsx"
      - "src/components/LandingTrustStrip.tsx"
      - "src/routes/_marketing.compound.tsx"
      - "src/pages/Contact/index.tsx"
      - "src/routes/contact.tsx"
      - "src/pages/RequestCatalog/index.tsx"
      - "src/routes/request-catalog.tsx"
      - "src/lib/analytics.ts"
      - "src/lib/sendPublicMail.ts"
      - "src/routes/api/public/send-mail.ts"
      - "public/PH-Labs-Research-Catalogue.pdf"
      - "e2e/compound-contact-catalog-regression.spec.ts"
      - "e2e/compound-catalog-visual.spec.ts"
      - "tests/catalogue-pdf-contents.test.ts"
      - "playwright.config.ts"
      - ".github/workflows/e2e-compound-contact-catalog.yml"
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-compound-contact-catalog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pdf-contents:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"
      - run: bash scripts/ci-bun-install.sh
      - name: Verify catalogue PDF contents
        run: bunx vitest run tests/catalogue-pdf-contents.test.ts

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    env:
      TEST_BASE_URL: https://phlabs.co.uk
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bash scripts/ci-bun-install.sh

      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          bunx playwright install --with-deps ${{ matrix.browser }}
          bunx playwright install --with-deps chromium --only-shell


      - name: Run regression spec (functional, both browsers)
        run: |
          bunx playwright test \
            e2e/compound-contact-catalog-regression.spec.ts \
            e2e/compound-catalog-visual.spec.ts \
            --project=${{ matrix.browser }} \
            --reporter=list,html,junit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit.xml

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload screenshots / videos / traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ matrix.browser }}
          # test-results/ holds per-test trace.zip, screenshots, videos.
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-log-${{ matrix.browser }}
          path: server.log
          if-no-files-found: ignore
          retention-days: 7
