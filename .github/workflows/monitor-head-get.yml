name: HEAD vs GET Monitor
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      hosts:
        description: "Comma-separated hosts to probe (defaults to phlabs.co.uk + prohealthpeptides.co.uk)"
        required: false
        default: "https://phlabs.co.uk,https://prohealthpeptides.co.uk"
      fail_on_alert:
        description: "Fail the job if a GET alert is raised"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      notify:
        description: "Send Slack + email notifications on failure"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run HEAD vs GET monitor
        id: run
        env:
          MONITOR_HOSTS: ${{ github.event.inputs.hosts || 'https://phlabs.co.uk,https://prohealthpeptides.co.uk' }}
        run: |
          set +e
          node scripts/monitor-head-get.mjs | tee /tmp/monitor.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Write CI summary
        if: always()
        env:
          MONITOR_HOSTS: ${{ github.event.inputs.hosts }}
        run: |
          {
            echo "## HEAD vs GET Monitor"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Hosts: \`${MONITOR_HOSTS:-default}\`"
            echo "- Exit code: \`${{ steps.run.outputs.exit }}\`"
            echo ""
            echo "<details><summary>Last check output</summary>"
            echo ""
            echo '```'
            cat /tmp/monitor.log 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Notify Slack + email on failure
        if: always() && steps.run.outputs.exit != '0' && (github.event.inputs.notify || 'true') == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_TITLE: "phlabs.co.uk HEAD vs GET Monitor FAILED"
          ALERT_LOG_PATH: /tmp/monitor.log
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-monitor-alert.mjs
      - name: Enforce alert exit
        if: always()
        run: |
          if [ "${{ github.event.inputs.fail_on_alert || 'true' }}" = "false" ]; then
            echo "fail_on_alert=false — ignoring exit code ${{ steps.run.outputs.exit }}"
            exit 0
          fi
          exit ${{ steps.run.outputs.exit }}
