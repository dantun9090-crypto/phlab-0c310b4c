name: HEAD vs GET Monitor
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run HEAD vs GET monitor
        run: node scripts/monitor-head-get.mjs
