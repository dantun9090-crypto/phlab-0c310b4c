name: HEAD vs GET Monitor
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      hosts:
        description: "Comma-separated hosts to probe (defaults to phlabs.co.uk + legacy host)" # check-domains-allow-line
        required: false
        default: "https://phlabs.co.uk,https://prohealthpeptides.co.uk" # check-domains-allow-line: legacy host monitored intentionally
      fail_on_alert:
        description: "Fail the job if a GET alert is raised"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      notify:
        description: "Send Slack + email notifications on failure"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run HEAD vs GET monitor
        id: run
        env:
          MONITOR_HOSTS: ${{ github.event.inputs.hosts || 'https://phlabs.co.uk,https://prohealthpeptides.co.uk' }} # check-domains-allow-line: legacy host monitored intentionally
          MONITOR_SOURCE: ${{ github.event_name == 'workflow_dispatch' && 'ci-manual' || 'ci-cron' }}
          MONITOR_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          node scripts/monitor-head-get.mjs | tee /tmp/monitor.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Write CI summary
        if: always()
        env:
          MONITOR_HOSTS: ${{ github.event.inputs.hosts }}
        run: |
          {
            echo "## HEAD vs GET Monitor"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Hosts: \`${MONITOR_HOSTS:-default}\`"
            echo "- Exit code: \`${{ steps.run.outputs.exit }}\`"
            echo ""
            echo "<details><summary>Last check output</summary>"
            echo ""
            echo '```'
            cat /tmp/monitor.log 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Notify Slack + email on sustained failure
        if: always() && steps.run.outputs.exit != '0' && (github.event.inputs.notify || 'true') == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MONITOR_ALERT_MIN_FAILURES: ${{ vars.MONITOR_ALERT_MIN_FAILURES || '2' }}
          MONITOR_ALERT_WINDOW_MIN: ${{ vars.MONITOR_ALERT_WINDOW_MIN || '30' }}
          MONITOR_ALERT_COOLDOWN_MIN: ${{ vars.MONITOR_ALERT_COOLDOWN_MIN || '60' }}
          ALERT_TITLE: "phlabs.co.uk HEAD vs GET Monitor FAILED"
          ALERT_LOG_PATH: /tmp/monitor.log
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/throttle-monitor-alert.mjs
      - name: Enforce alert exit
        if: always()
        run: |
          status="${{ steps.run.outputs.exit || '0' }}"
          if [ "${{ github.event.inputs.fail_on_alert || 'true' }}" = "false" ]; then
            echo "fail_on_alert=false — ignoring exit code ${status}"
            exit 0
          fi
          case "$status" in
            ''|*[!0-9]*) status=1 ;;
          esac
          if [ "$status" -gt 255 ]; then status=1; fi
          exit "$status"
