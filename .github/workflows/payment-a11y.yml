name: Payment a11y (PaymentMethodOptions)
# Runs the payment selector accessibility, integration, keyboard, and visual
# regression suites on every PR + push to main.
# Fails the build on:
#   - NEW serious/critical axe violations
#   - broken role / aria semantics
#   - tap targets that drop below 44×44
#   - focus traps or skipped controls at 320px / 360px
#   - layout-affecting DOM/CSS drift vs the committed screenshot baseline
on:
  pull_request:
    paths:
      - "src/components/PaymentMethodOptions.tsx"
      - "src/components/PaymentMethodOptions.test.tsx"
      - "src/routes/__e2e.payment-options.tsx"
      - "e2e/payment-options-a11y.spec.ts"
      - "e2e/payment-options-domain-guard.spec.ts"
      - "e2e/payment-options-visual.spec.ts"
      - "e2e/payment-options-visual.spec.ts-snapshots/**"
      - "playwright.config.ts"
      - "vitest.config.ts"
      - ".github/workflows/payment-a11y.yml"
  push:
    branches: [main]
    paths:
      - "src/components/PaymentMethodOptions.tsx"
      - "src/components/PaymentMethodOptions.test.tsx"
      - "src/routes/__e2e.payment-options.tsx"
      - "e2e/payment-options-a11y.spec.ts"
      - "e2e/payment-options-visual.spec.ts"

permissions:
  contents: read

jobs:
  unit:
    name: Vitest (PaymentMethodOptions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Unit + responsive tests
        run: bunx vitest run src/components/PaymentMethodOptions.test.tsx

  a11y:
    name: Playwright a11y (${{ matrix.project }})
    needs: unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run the role/aria/keyboard suite on all three engines to catch
        # browser-specific focus + ARIA behaviour differences.
        project: [chromium, firefox, webkit]
    env:
      TEST_BASE_URL: https://id-preview--1f12c255-a30a-4bea-bbab-28d9e6f70804.lovable.app
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps ${{ matrix.project }}
      - name: Run a11y suite
        run: bunx playwright test e2e/payment-options-a11y.spec.ts --project=${{ matrix.project }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y-${{ matrix.project }}
          path: playwright-report
          retention-days: 7

  visual:
    # Visual regression is Chromium-only — Firefox/WebKit font hinting makes
    # pixel diffing noisy. Structural / keyboard checks above already cover
    # the other engines.
    name: Playwright visual + integration (Chromium)
    needs: unit
    runs-on: ubuntu-latest
    env:
      TEST_BASE_URL: https://id-preview--1f12c255-a30a-4bea-bbab-28d9e6f70804.lovable.app
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run visual + integration suite
        run: bunx playwright test e2e/payment-options-visual.spec.ts --project=chromium
      - name: Upload visual diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diff
          path: |
            playwright-report
            test-results
          retention-days: 14
