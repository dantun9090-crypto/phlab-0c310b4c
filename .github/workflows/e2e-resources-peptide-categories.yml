name: E2E — /resources/peptide-categories-uk-research regression

# Visual, SEO head, sitemap, navigation, and axe a11y regression for the
# compliant Semrush pillar article. Runs on every PR touching the article,
# its route, the SEO helpers, the sitemap, or the spec itself, plus nightly
# and on demand. Matrix runs Chromium + Firefox; the visual-snapshot test
# inside the spec is skipped on Firefox (font hinting differs).

on:
  pull_request:
    paths:
      - "src/routes/resources.peptide-categories-uk-research.tsx"
      - "src/routes/resources.tsx"
      - "src/pages/Resources/data/articles.ts"
      - "src/pages/Resources/data/articles-index.ts"
      - "src/lib/legacy-mount.tsx"
      - "src/lib/seo-meta.ts"
      - "src/routes/sitemap.xml.ts"
      - "e2e/resources-peptide-categories-visual.spec.ts"
      - "playwright.config.ts"
      - ".github/workflows/e2e-resources-peptide-categories.yml"
      - ".lighthouserc.resources.json"
      - ".lighthouserc.resources.mobile.json"
      - "scripts/lh-baseline-delta.mjs"
      - "lighthouse-baseline/**"

  schedule:
    - cron: "37 5 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-resources-peptide-categories-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    env:
      TEST_BASE_URL: http://localhost:8080
      RESOURCES_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bash scripts/ci-bun-install.sh

      - name: Install Playwright browser (${{ matrix.browser }})
        run: bunx playwright install --with-deps ${{ matrix.browser }}

      - name: Start dev server
        run: |
          (bun run dev > server.log 2>&1 &)
          for i in $(seq 1 90); do
            if curl -fsS -o /dev/null "http://localhost:8080/"; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start"; tail -n 200 server.log; exit 1

      - name: Run resources-peptide-categories-visual spec
        run: |
          bunx playwright test \
            e2e/resources-peptide-categories-visual.spec.ts \
            --project=${{ matrix.browser }} \
            --reporter=list,html,junit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit.xml

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-resources-peptide-categories-visual-${{ matrix.browser }}
          path: |
            playwright-report/**
            !playwright-report/**/.cache/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload screenshots / videos / trace.zip (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          # Artifact name encodes the spec + browser viewport so multiple
          # matrix legs don't collide in the run summary.
          name: playwright-artifacts-resources-peptide-categories-visual-${{ matrix.browser }}
          path: |
            test-results/resources-peptide-categories-visual-*/**
            test-results/**/trace.zip
            test-results/**/*.png
            test-results/**/*.webm
            test-results/junit.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-log-resources-peptide-categories-visual-${{ matrix.browser }}
          path: server.log
          if-no-files-found: ignore
          retention-days: 7


  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        viewport: [desktop, mobile]
        include:
          - viewport: desktop
            config: .lighthouserc.resources.json
            report_dir: lhci-report
            baseline: lighthouse-baseline/desktop.json
          - viewport: mobile
            config: .lighthouserc.resources.mobile.json
            report_dir: lhci-report-mobile
            baseline: lighthouse-baseline/mobile.json

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: bash scripts/ci-bun-install.sh

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Start dev server
        run: |
          (bun run dev > server.log 2>&1 &)
          for i in $(seq 1 90); do
            if curl -fsS -o /dev/null "http://localhost:8080/resources/peptide-categories-uk-research"; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start"; tail -n 200 server.log; exit 1

      - name: Run Lighthouse CI — ${{ matrix.viewport }} (absolute thresholds)
        run: lhci autorun --config=${{ matrix.config }}

      - name: Baseline-delta regression check — ${{ matrix.viewport }}
        # Fails ONLY when a tracked category regresses beyond the tolerance
        # vs the committed baseline. lhci already enforces absolute floors;
        # this catches drift inside the floor (e.g. perf 0.92 → 0.84).
        run: |
          node scripts/lh-baseline-delta.mjs \
            --report-dir ${{ matrix.report_dir }} \
            --baseline ${{ matrix.baseline }} \
            --max-delta 0.05



      - name: Upload Lighthouse report (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report-resources-peptide-categories-${{ matrix.viewport }}
          path: ${{ matrix.report_dir }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-log-lighthouse-resources-peptide-categories-${{ matrix.viewport }}
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

