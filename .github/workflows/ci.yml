name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  worker-build-and-check:
    name: Production build + Worker import guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Needed for cosign keyless SBOM signing (OIDC -> Fulcio -> Rekor).
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      # Strict TypeScript check — fails the build on any type error.
      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      # Scans /resources/* articles for efficacy-outcome claims and
      # missing investigational disclaimers (UK MHRA / Google Merchant).
      - name: Resources content compliance scan
        run: bun run compliance:scan

      # Guards canonical host: fails if any source references the wrong
      # domain (typo of brand, legacy domain, preview hosts). check-domains-allow-line
      - name: Domain consistency guard
        run: bun run check:domains

      # Sprawdza, że sitemap / sitemap-audit / robots.txt / server CANONICAL_HOST /
      # JSON-LD wszystkie używają jednego SITE_URL ze src/lib/seo-meta.ts.
      # Komplementarne do check:domains (które blokuje zabronione hosty w repo).
      - name: URL consistency guard (sitemap ↔ robots ↔ JSON-LD ↔ server)
        run: bun run check:url-consistency


      # SEO regression: title/description length limits, sitemap <loc> ↔
      # canonical URL alignment for every static + sampled dynamic path.
      - name: SEO meta + canonical alignment
        run: bun run seo:check

      # JSON-LD schema validation (Product, Article, Organization).
      - name: JSON-LD schema tests
        run: bun run test:jsonld

      # Checkout + Admin Orders regression suite:
      #   - createOrder server schema (customerNote optional/trim/500-char cap)
      #   - Admin → Orders "Customer note" panel render contract
      #   - Checkout source wiring (textarea + forward to createOrder)
      #   - Cart price validation, order tracking, payment retry, recovery
      - name: Checkout + Admin Orders regression
        run: bun run test:checkout

      # Sitemap CI guardrail:
      #   - sitemap policy ↔ route-tree consistency
      #   - sitemap BASE_URL ↔ seo-meta SITE_URL
      #   - robots.txt Sitemap: directive ↔ canonical host
      #   - static sitemap URL count does not silently shrink
      #   - canonicalUrl(path) == sitemap <loc> for every static path
      - name: Sitemap / canonical / robots consistency
        run: bun run test:sitemap

      # Runs the EXACT production build that ships to Cloudflare Workers.
      # No --mode development, no dev-only shortcuts.
      - name: Production build
        run: bun run build

      # Scans dist/server/** (the Worker bundle) and fails if any Node-only
      # module slipped in. Catches regressions like a transitive dep pulling
      # in child_process / sharp / puppeteer before they reach prod.
      - name: Verify no Node-only imports in Worker bundle
        run: bun run worker:check-imports

      # Dependency vulnerability gate: queries OSV.dev for every
      # resolved package@version in the SBOM and fails on any advisory
      # of medium severity or higher (configurable via
      # SECURITY_MIN_SEVERITY). Triaged false-positives live in
      # .security-ignore.json — adding to that list requires a PR.
      - name: Dependency vulnerability scan (blocks medium+)
        run: bun run security:scan

      # Upload the CycloneDX SBOM (already generated by `postbuild`)
      # as an artifact so every CI run leaves an immutable audit trail
      # of what packages would have shipped on this build.
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: dist/sbom.cdx.json
          retention-days: 90

      # Live HTTP probe: verifies www -> apex 301 across key routes.
      # Skips automatically offline (SKIP_WWW_REDIRECT_CHECK=1).
      - name: WWW -> apex redirect check
        run: bun run check:www-redirect

      # Live crawler / SEO smoke against phlabs.co.uk:
      #   - www + legacy domain → apex 301 (path preserved)
      #   - /robots.txt: 200, Sitemap directive, disallow admin/checkout/etc.
      #   - /sitemap.xml: 200, valid XML, apex URLs, product entries
      #   - Prerender output for /, /products, /products/bpc-157, /about,
      #     /contact against Googlebot, Bingbot, Facebook, Twitter, LinkedIn
      # Self-skips with SKIP_CRAWLER_SMOKE=1.
      - name: Crawler / SEO smoke (redirects + robots + sitemap + prerender)
        run: bun run smoke:crawler
        continue-on-error: true

      # Live Fena API contract tests — only run when the workflow has the
      # FENA_TERMINAL_ID / FENA_TERMINAL_SECRET secrets injected. Tests
      # self-skip otherwise (FENA_INTEGRATION must equal "1").
      - name: Fena live integration tests (opt-in)
        if: ${{ env.FENA_TERMINAL_ID != '' && env.FENA_TERMINAL_SECRET != '' }}
        env:
          FENA_INTEGRATION: '1'
          FENA_TERMINAL_ID: ${{ secrets.FENA_TERMINAL_ID }}
          FENA_TERMINAL_SECRET: ${{ secrets.FENA_TERMINAL_SECRET }}
        run: bun run test:fena

  # Fast, path-filtered regression — runs in parallel with the main build
  # only when Checkout, Admin Orders, or the order/cart server code changes.
  # Keeps PR feedback under a minute for touch-and-go UI tweaks.
  checkout-orders-regression:
    name: Checkout + Admin Orders regression (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            checkout:
              - 'src/pages/Checkout/**'
              - 'src/pages/Admin/tabs/OrdersTab.tsx'
              - 'src/lib/create-order.*'
              - 'src/lib/cart-validation.*'
              - 'src/lib/order-tracking.*'
              - 'src/lib/order-payment-retry.*'
              - 'src/lib/customer-note.test.tsx'
              - 'src/lib/recovery.*'

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.checkout == 'true'
        with:
          bun-version: latest

      - name: Install deps
        if: steps.changes.outputs.checkout == 'true'
        run: bun install --frozen-lockfile

      - name: Run checkout + admin orders regression
        if: steps.changes.outputs.checkout == 'true'
        run: bun run test:checkout



