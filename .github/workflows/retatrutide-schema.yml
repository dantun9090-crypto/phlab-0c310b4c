name: Retatrutide schema validation

on:
  pull_request:
    paths:
      - 'src/lib/product-seo-overrides.ts'
      - 'src/pages/ProductDetail/index.tsx'
      - 'src/lib/retatrutide-schema.test.ts'
      - '.github/workflows/retatrutide-schema.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"
      - run: bash scripts/ci-bun-install.sh
      - name: Validate Retatrutide FAQ + HowTo JSON-LD includes target misspellings
        run: bunx vitest run src/lib/retatrutide-schema.test.ts --reporter=verbose
