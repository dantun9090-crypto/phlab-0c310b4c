name: Security scan (deps)

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily 06:30 Europe/London — catches newly-published advisories
    # against already-merged code (no PR needed to surface).
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      min_severity:
        description: "Minimum severity that fails the build (overrides .security-config.json for this run only)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "low"
          - "medium"
          - "high"
          - "critical"

jobs:
  security-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      # Required for cosign keyless signing via GitHub OIDC.
      # The ephemeral signing certificate is bound to this workflow's
      # identity (repo + ref + job) and logged to the Sigstore Rekor
      # transparency log so the SBOM signature is publicly auditable.
      id-token: write
    steps:
      - uses: actions/checkout@v4


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun's global install store keyed on the lockfile so repeat
      # CI runs skip the registry round-trip and resolve from disk. Safe
      # because `bun install --frozen-lockfile` is the only writer and
      # bun.lock pins every transitive version — results stay deterministic.
      - name: Cache Bun install store
        id: bun_cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - name: Install deps (frozen)
        run: bun install --frozen-lockfile

      # Cache the generated SBOM keyed on lockfile + generator source.
      # The SBOM is a pure function of the resolved tree, so any bun.lock
      # or generate-sbom.ts change busts the cache; otherwise we restore
      # dist/sbom.cdx.json verbatim and skip the node_modules walk.
      - name: Ensure dist/ exists
        run: mkdir -p dist

      - name: Cache SBOM (CycloneDX)
        id: sbom_cache
        uses: actions/cache@v4
        with:
          path: dist/sbom.cdx.json
          key: sbom-${{ runner.os }}-${{ hashFiles('bun.lock', 'scripts/generate-sbom.ts') }}

      # Blocking threshold resolved by scripts/security-audit.ts:
      #   SECURITY_MIN_SEVERITY env  >  .security-config.json  >  "medium"
      # Set the env from the workflow_dispatch input so a maintainer can
      # tighten/loosen the gate for a one-off run without editing code.
      - name: Run dependency audit
        id: audit
        env:
          SECURITY_MIN_SEVERITY: ${{ github.event.inputs.min_severity }}
        run: |
          set +e
          bun run security:scan | tee dist/security-audit.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # Always upload the JSON audit report + the human log as a CI
      # artifact, even when the gate fails — reviewers can download
      # it to triage findings without re-running the scan locally.
      - name: Upload security-scan JSON + log artifact
        id: upload_audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.sha }}
          path: |
            dist/security-audit.json
            dist/security-audit.log
          retention-days: 90
          if-no-files-found: warn

      # Post (or update) a PR comment with the post-fix vulnerability
      # summary. Same hidden marker each run so we edit the existing
      # comment instead of spamming new ones. Skipped on push / cron /
      # workflow_dispatch where there is no PR context.
      - name: Post vulnerability summary to PR + job summary
        if: always()
        uses: actions/github-script@v7
        env:
          AUDIT_EXIT: ${{ steps.audit.outputs.exit_code }}
          ARTIFACT_ID: ${{ steps.upload_audit.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload_audit.outputs.artifact-url }}
          INPUT_OVERRIDE: ${{ github.event.inputs.min_severity }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            // Load the shared builder (unit-tested in
            // tests/security-pr-comment.test.ts) via dynamic import so the
            // markdown layout stays in lock-step with the tests.
            const { buildSecurityComment, MARKER } = await import(
              path.resolve(process.env.GITHUB_WORKSPACE, 'scripts/lib/security-pr-comment.mjs')
            );
            const reportPath = 'dist/security-audit.json';
            const exitCode = process.env.AUDIT_EXIT || '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // One-click download link for the artifact zip (requires GitHub
            // login; upload-artifact@v4's `artifact-url` is the canonical,
            // sha-pinned URL the Actions UI itself links to).
            const artifactUrl =
              process.env.ARTIFACT_URL
              || (process.env.ARTIFACT_ID
                ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${process.env.ARTIFACT_ID}`
                : `${runUrl}#artifacts`);
            const report = fs.existsSync(reportPath)
              ? JSON.parse(fs.readFileSync(reportPath, 'utf8'))
              : null;
            const { body } = buildSecurityComment({
              report,
              runUrl,
              artifactUrl,
              sha: context.sha,
              exitCode,
              inputOverride: process.env.INPUT_OVERRIDE || '',
            });

            // Mirror the same body into the Actions Job Summary so push /
            // cron / workflow_dispatch runs (which have no PR context) also
            // surface the gate status + minSeverity + JSON artifact link.
            await core.summary.addRaw(body.replace(MARKER, '').trimStart()).write();

            // PR comment: only on pull_request events.
            if (context.eventName !== 'pull_request' || !context.issue.number) return;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const existing = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const prev = existing.find(c => c.body && c.body.includes(MARKER));
            if (prev) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # Re-raise the scan failure so the job (and merge gate) fails
      # *after* the artifact has been uploaded and the PR commented.
      - name: Enforce audit gate
        if: always()
        run: |
          if [ "${{ steps.audit.outputs.exit_code }}" != "0" ]; then
            echo "Security audit failed (exit ${{ steps.audit.outputs.exit_code }})."
            exit 1
          fi

      # Generate CycloneDX SBOM for the PR for review / artifact diff.
      - name: Generate SBOM (CycloneDX)
        if: always()
        run: bun run sbom

      # Sign the SBOM with cosign in keyless mode (OIDC -> Fulcio ->
      # Rekor transparency log). Produces:
      #   - dist/sbom.cdx.json.sig  (detached signature, base64)
      #   - dist/sbom.cdx.json.pem  (ephemeral signing certificate)
      # Verifiable later with:
      #   cosign verify-blob \
      #     --certificate dist/sbom.cdx.json.pem \
      #     --signature dist/sbom.cdx.json.sig \
      #     --certificate-identity-regexp '^https://github\.com/.*/\.github/workflows/security-scan\.yml@' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     dist/sbom.cdx.json
      - name: Install cosign
        if: always()
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign SBOM (cosign keyless)
        if: always()
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/sbom.cdx.json.sig \
            --output-certificate dist/sbom.cdx.json.pem \
            dist/sbom.cdx.json

      - name: Verify SBOM signature (self-check)
        if: always()
        run: |
          cosign verify-blob \
            --certificate dist/sbom.cdx.json.pem \
            --signature dist/sbom.cdx.json.sig \
            --certificate-identity-regexp "^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/security-scan\.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/sbom.cdx.json

      # Bind the SBOM blob to this exact build + commit via a SLSA v1.0
      # Provenance attestation (DSSE in-toto, cosign keyless, Rekor-logged).
      # Plus a CycloneDX SBOM attestation that wraps the SBOM itself as
      # its own predicate for tooling that consumes attested SBOMs.
      - name: Generate SLSA provenance predicate
        if: always()
        env:
          BUILD_ID: ${{ github.sha }}
        run: bun run sbom:provenance

      - name: Attest SBOM (SLSA provenance, cosign keyless)
        if: always()
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest-blob \
            --yes \
            --predicate dist/sbom.cdx.json.provenance.json \
            --type slsaprovenance1 \
            --output-attestation dist/sbom.cdx.json.provenance.intoto.jsonl \
            --output-certificate dist/sbom.cdx.json.provenance.pem \
            dist/sbom.cdx.json

      - name: Attest SBOM (CycloneDX predicate, cosign keyless)
        if: always()
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest-blob \
            --yes \
            --predicate dist/sbom.cdx.json \
            --type cyclonedx \
            --output-attestation dist/sbom.cdx.json.cyclonedx.intoto.jsonl \
            --output-certificate dist/sbom.cdx.json.cyclonedx.pem \
            dist/sbom.cdx.json

      - name: Verify SLSA provenance attestation (self-check)
        if: always()
        run: |
          cosign verify-blob-attestation \
            --signature dist/sbom.cdx.json.provenance.intoto.jsonl \
            --type slsaprovenance1 \
            --certificate-identity-regexp "^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/security-scan\.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/sbom.cdx.json

      - name: Upload SBOM + signature + attestations artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            dist/sbom.cdx.json
            dist/sbom.cdx.json.sha256
            dist/sbom.cdx.json.sig
            dist/sbom.cdx.json.pem
            dist/sbom.cdx.json.provenance.json
            dist/sbom.cdx.json.provenance.intoto.jsonl
            dist/sbom.cdx.json.provenance.pem
            dist/sbom.cdx.json.cyclonedx.intoto.jsonl
            dist/sbom.cdx.json.cyclonedx.pem
          retention-days: 90

  # Required-for-merge GitHub Check (paired with the same job in ci.yml).
  # Downloads the SBOM bundle this workflow just uploaded and re-runs the
  # signature + SLSA Provenance + CycloneDX cosign verifications. The job
  # name "Attestation verify (SLSA + CycloneDX)" is what branch protection
  # requires under Settings -> Rules -> Require status checks, so any
  # broken signature/attestation blocks PR merge with the cosign error
  # rendered on the Check page.
  attestation-verify:
    name: Attestation verify (SLSA + CycloneDX)
    runs-on: ubuntu-latest
    needs: security-scan
    if: always() && needs.security-scan.result == 'success'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Download SBOM bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-bundle

      - name: Verify SBOM signature + SLSA Provenance + CycloneDX attestations
        run: bash scripts/verify-attestations.sh sbom-bundle security-scan

      - name: Upload attestation debug bundle (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: attestation-debug-security-scan-${{ github.sha }}
          path: |
            sbom-bundle/sbom.cdx.json
            sbom-bundle/sbom.cdx.json.sha256
            sbom-bundle/sbom.cdx.json.sig
            sbom-bundle/sbom.cdx.json.pem
            sbom-bundle/sbom.cdx.json.provenance.intoto.jsonl
            sbom-bundle/sbom.cdx.json.provenance.pem
            sbom-bundle/sbom.cdx.json.cyclonedx.intoto.jsonl
            sbom-bundle/sbom.cdx.json.cyclonedx.pem
            sbom-bundle/verify-attestations.log
          retention-days: 30



