name: Live smoke test (phlabs.co.uk)

# Hits the live homepage every 30 min and fails if the page returns
# empty HTML, the "Please refresh" / "Something went wrong" fallback,
# or any uncaught JS error fires during load.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "e2e/live-smoke.spec.ts"
      - ".github/workflows/live-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Smoke test live homepage
        env:
          SMOKE_BASE_URL: https://phlabs.co.uk
        run: bunx playwright test e2e/live-smoke.spec.ts --reporter=line
