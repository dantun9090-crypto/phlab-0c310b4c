# gitleaks config вЂ” extends the shipped default ruleset (100+ providers:
# AWS, GCP, Stripe, Slack, GitHub, Firebase, Supabase service_role, etc.).
# We keep the defaults strict and only allowlist known-safe placeholders,
# fixtures, and public tokens that live in this repo on purpose.
#
# Rule of thumb: better a false positive we allowlist here (one line, with
# a reason) than a missed Supabase service_role key in production.

title = "phlabs secret-scan config"

[extend]
useDefault = true

# в”Ђв”Ђ Global allowlist в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Regexes match against the leaked SECRET value (not the file). Path
# allowlists match the file path relative to repo root.
[allowlist]
description = "Global allowlist: placeholders, fixtures, docs, example files."

paths = [
  # Example / template env files never contain real secrets.
  '''(^|/)\.env\.example$''',
  '''(^|/)\.env\.sample$''',
  '''(^|/)\.env\.template$''',
  # Docs referencing tokens/keys illustratively.
  '''^docs/.*\.md$''',
  '''^README\.md$''',
  # Test fixtures вЂ” fake tokens by design.
  '''^tests?/.*fixtures?/''',
  '''^src/test/fixtures/''',
  '''^e2e/.*\.spec\.ts$''',
  # Public bank logos etc. вЂ” no secret material.
  '''^public/bank-logos/''',
  # This config file itself references example patterns.
  '''^\.gitleaks\.toml$''',
  # Lockfiles: integrity hashes trip entropy rules, never contain secrets.
  '''(^|/)(bun\.lock|bun\.lockb|package-lock\.json|yarn\.lock|pnpm-lock\.yaml)$''',
  # Generated SBOMs list hashes, not secrets.
  '''(^|/)sbom.*\.json$''',
  # Firestore rules / indexes вЂ” declarative, no key material.
  '''(^|/)firestore\.(rules|indexes\.json)$''',
]

regexes = [
  # Obvious placeholder tokens вЂ” case-insensitive.
  '''(?i)your[-_]?(api[-_]?)?(key|token|secret)''',
  '''(?i)example[-_]?(api[-_]?)?(key|token|secret)?''',
  '''(?i)placeholder''',
  '''(?i)changeme''',
  '''(?i)dummy[-_]?(key|token|secret)''',
  '''(?i)fake[-_]?(key|token|secret)''',
  '''(?i)test[-_]?(key|token|secret)''',
  # AWS' canonical documentation example key вЂ” appears in gitleaks' own test
  # fixtures and in security demos; NOT a real credential.
  '''AKIAIOSFODNN7EXAMPLE''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
  # Sequences of x's / 0's used as redactions.
  '''x{16,}''',
  '''0{16,}''',
]

stopwords = [
  "example",
  "placeholder",
  "your-token",
  "your-key",
  "your-secret",
  "dummy",
  "changeme",
  "xxxxxxxx",
]

# в”Ђв”Ђ Project-specific: Supabase anon/publishable keys are PUBLIC by design в”Ђв”Ђ
# Anon JWTs (role=anon) are safe to embed in client bundles; RLS protects
# data. Service-role keys (role=service_role) are NEVER allowlisted and
# must trigger the gate.
[[rules]]
id = "supabase-service-role-jwt"
description = "Supabase service_role JWT (server-only, must never be committed)"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]*(?:c2VydmljZV9yb2xl|"role":\s*"service_role")[A-Za-z0-9_-]*\.[A-Za-z0-9_-]{20,}'''
keywords = ["service_role", "eyJ"]
tags = ["supabase", "critical"]
